function cambiarSubTabRef(tab){
  window._refSubTab=tab;
  var el=document.getElementById('tab-content');
  if(el&&window.renderTab)renderTab('referidos-t');
}
function cambiarTabVend(tab){
  var el=document.getElementById('content');
  if(el){
    el.dataset.vendTab=tab;
    // Asegurar que el nav-vendedores siga activo
    document.querySelectorAll('.ni').forEach(function(n){n.classList.remove('active');});
    var ni=document.getElementById('nav-vendedores');
    if(ni)ni.classList.add('active');
    if(window.renderViewVendedores)renderViewVendedores(el);

}
function filtrarTablaParticipantes(val){
  const q=(val||'').toLowerCase();
  document.querySelectorAll('#tbody-vparts tr').forEach(function(tr){
    var txt=(tr.dataset.busq||'').toLowerCase();
    tr.style.display=(!q||txt.includes(q))?'':'none';
  });
}
function filtrarListaVendedores(val){
  var q=(val||'').toLowerCase();
  document.querySelectorAll('#tbody-vend-lista tr').forEach(function(tr){
    var txt=(tr.dataset.bv||'').toLowerCase();
    tr.style.display=(!q||txt.includes(q))?'':'none';
  });
}
function filtrarCCVendedores(val){
  var el=document.getElementById('content');
  if(el)el.dataset.busqCC=val;
  var q=(val||'').toLowerCase();
  // Filtrar filas DOM directamente (sin re-render)
  var tbody=el?el.querySelector('#cc-vend-tbody'):null;
  if(tbody){
    tbody.querySelectorAll('tr').forEach(function(tr){
      var txt=(tr.dataset.busqv||'').toLowerCase();
      tr.style.display=(!q||txt.includes(q))?'':'none';
    });
    return;
  }
  // Fallback: re-renderizar
  if(window.renderViewVendedores&&el){renderViewVendedores(el);}
}

// ── JUGADAS MÚLTIPLES: fuente única de verdad ─────────────
// Devuelve [{uid, jIdx}] de todas las jugadas habilitadas en una fecha
function jugadasHabilitadasDeFecha(fi, t){
  const aus=t.ausencias||{};
  const uids=t.participantes||[];
  const result=[];
  uids.forEach(uid=>{
    const nJ=t.jugadas?.[`${fi}-${uid}`]||1;
    for(let jIdx=0;jIdx<nJ;jIdx++){
      const kJ=`${fi}-${uid}-${jIdx}`;
      const kG=`${fi}-${uid}`;
      let habilitada;
      if(kJ in aus) habilitada=aus[kJ]===false;
      else if(kG in aus) habilitada=aus[kG]===false;
      else habilitada=false;
      if(habilitada) result.push({uid,jIdx});
    }
  });
  return result;
}

// Cuántas jugadas habilitadas tiene un uid en una fecha
function nJugadasHabilitadas(fi, uid, t){
  return jugadasHabilitadasDeFecha(fi,t).filter(j=>j.uid===uid).length;
}

// Clave del pronóstico: indexado o legacy (jIdx=0 sin índice)
function pronKey(fi, pi, uid, jIdx, sufijo=''){
  const base=`${fi}-${pi}-${uid}`;
  if(jIdx===0){
    // Intentar clave indexada primero, fallback a legacy
    return sufijo?`${base}-0-${sufijo}`:`${base}-0`;
  }
  return sufijo?`${base}-${jIdx}-${sufijo}`:`${base}-${jIdx}`;
}
function getPron(t, fi, pi, uid, jIdx, sufijo=''){
  const kIdx=sufijo?`${fi}-${pi}-${uid}-${jIdx}-${sufijo}`:`${fi}-${pi}-${uid}-${jIdx}`;
  if(t.pronosticos?.[kIdx]!==undefined) return t.pronosticos[kIdx];
  // Legacy fallback solo para jIdx=0
  if(jIdx===0){
    const kLeg=sufijo?`${fi}-${pi}-${uid}-${sufijo}`:`${fi}-${pi}-${uid}`;
    return t.pronosticos?.[kLeg];
  }
  return undefined;
}
function jugadaCerrada(fi, uid, jIdx, t){
  // Nuevo formato primero
  if(t.pronosticosCerrados?.[`${fi}-${uid}-${jIdx}`]) return true;
  // Legacy: jIdx=0
  if(jIdx===0&&t.pronosticosCerrados?.[`${fi}-${uid}`]) return true;
  return false;
}

function dref(path){const p=path.split('/');let r=null;p.forEach((s,i)=>r=i%2===0?(r?collection(r,s):collection(db,s)):doc(r,s));return r;}
async function fget(path){const s=await getDoc(dref(path));return s.exists()?s.data():null;}
async function fset(path,data){await setDoc(dref(path),data,{merge:true});}
async function fupd(path,data){try{await updateDoc(dref(path),data);}catch(e){await setDoc(dref(path),data,{merge:true});}}
function flisten(path,cb){const u=onSnapshot(dref(path),s=>cb(s.exists()?s.data():null));unsubs.push(u);return u;}
function stopAll(){unsubs.forEach(u=>u());unsubs=[];}

function cfg(){return S.data.config;}
function admins(){return cfg().admins||[];}
function allParts(){return cfg().participantes||{};}
function torneos(){return cfg().torneos||[];}
function T(){return S.torneoActivo?S.data.torneos[S.torneoActivo]:null;}
function partsT(){return T()?.participantes||[];}
function ausente(fi,uid){
  const t=T();if(!t)return true;
  const aus=t.ausencias||{};
  // Verificar clave general
  const kG=`${fi}-${uid}`;
  if(kG in aus&&aus[kG]===false)return false; // habilitado en general
  // Verificar si alguna jugada específica está habilitada
  const nJ=t.jugadas?.[`${fi}-${uid}`]||1;
  for(let j=0;j<nJ;j++){
    const kJ=`${fi}-${uid}-${j}`;
    if(kJ in aus&&aus[kJ]===false)return false; // al menos una jugada habilitada
  }
  return true; // ninguna habilitada
}

async function handleUserLogin(user){
  setApp('<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#aaa">Verificando...</div>');
  let cfgData=await fget('config/global');
  if(!cfgData){cfgData={admins:[],participantes:{},torneos:[]};await fset('config/global',cfgData);}
  S.data.config=cfgData;
  const parts=cfgData.participantes||{};
  const isAdmin=(cfgData.admins||[]).includes(user.uid);
  const pendingLogin=Object.entries(parts).find(([,p])=>p.estado==='pendiente_login'&&p.mail===user.email);
  if(pendingLogin){
    const[tempId,perfil]=pendingLogin;
    const newParts={...parts};delete newParts[tempId];
    newParts[user.uid]={...perfil,uid:user.uid,estado:'activo'};
    const ts=cfgData.torneos||[];
    for(const t of ts){const td=await fget(`torneos/${t.id}`);if(td&&(td.participantes||[]).includes(tempId))await fupd(`torneos/${t.id}`,{participantes:td.participantes.map(u=>u===tempId?user.uid:u)});}
    await fset('config/global',{participantes:newParts});S.data.config.participantes=newParts;
  }
  const myPart=S.data.config.participantes[user.uid];
  S.perfil=myPart||null;S.rol=isAdmin?'admin':'participante';
  if(isAdmin){await startApp();return;}
  if(!myPart){renderAutoRegistro(user);return;}
  if(myPart.estado==='pendiente_aprobacion'){renderEspera(myPart);return;}
  if(myPart.estado==='rechazado'){renderRechazado();return;}
  if(myPart.estado==='desactivado'){renderDesactivado();return;}
  await startApp();
}

async function startApp(){
  renderShell();
  flisten('config/global',async data=>{
    S.data.config=data||{admins:[],participantes:{},torneos:[]};
    S.perfil=(data?.participantes||{})[S.uid]||null;
    // FIX 3: si el participante fue aprobado en tiempo real, refrescar sesión
    if(S.rol==='participante'){
      const miPerfil=(data?.participantes||{})[S.uid];
      if(!miPerfil||miPerfil.estado==='pendiente_aprobacion'){
        // Todavía pendiente, mostrar pantalla de espera actualizada
        renderEspera(miPerfil||{nombre:''});return;
      }
      if(miPerfil.estado==='rechazado'){renderRechazado();return;}
      if(miPerfil.estado==='desactivado'){renderDesactivado();return;}
    }
    suscribirTorneos();
    renderTorneosNav();
    if(S.torneoActivo)refreshTorneoView();
    // Refrescar vistas globales si están activas
    const navVend=document.getElementById('nav-vendedores');
    if(navVend&&navVend.classList.contains('active')){
      const c=document.getElementById('content');if(c)renderViewVendedores(c);
    }
    // Refrescar vista de Participantes si está activa (para que admin vea cambios de estado)
    const navParts=document.getElementById('nav-participantes');
    if(navParts&&navParts.classList.contains('active')){
      const c=document.getElementById('content');if(c)renderViewParts(c);
    }

    badgePend();
    // FIX 1: Si el nav de torneos está vacío porque los datos aún no llegaron, esperar
    if(!S.data.torneos||Object.keys(S.data.torneos).length===0){
      setTimeout(()=>{renderTorneosNav();},800);
    }
  });
}
function suscribirTorneos(){
  torneos().forEach(t=>{
    if(!S.data.torneos[t.id]){
      S.data.torneos[t.id]={};
      flisten(`torneos/${t.id}`,data=>{
        S.data.torneos[t.id]=data||{};
        renderTorneosNav(); // FIX 1: actualizar nav cuando llegan datos del torneo
        if(S.torneoActivo===t.id)refreshTorneoView();
      });
    }
  });
}

function renderEspera(p){setApp(`<div class="lw"><div class="lc"><div class="ll">⏳</div><h1 class="lt" style="font-size:18px">Registro pendiente</h1><p class="ls">Hola <strong>${p.nombre}</strong>, tu solicitud está siendo revisada.</p><button class="btn" style="width:100%;margin-top:16px" onclick="cerrarSesion()">Salir</button></div></div>`);}
function renderDesactivado(){
  setApp(`<div class="lw"><div class="lc">

function renderRechazado(){setApp(`<div class="lw"><div class="lc"><div class="ll">❌</div><h1 class="lt" style="font-size:18px">Acceso denegado</h1><p class="ls">Contactá al administrador.</p><button class="btn" style="width:100%;margin-top:16px" onclick="cerrarSesion()">Salir</button></div></div>`);}

window.loginGoogle=async function(){
  try{
    const provider=new GoogleAuthProvider();
    provider.setCustomParameters({prompt:'select_account'}); // forzar selección de cuenta
    await signInWithPopup(auth,provider);
  }catch(e){
    if(e.code!=='auth/popup-closed-by-user')emsg('login-msg','Error: '+e.message);
  }
};
window.loginMagicLink=async function(){
  const email=document.getElementById('login-mail').value.trim();
  if(!email)return emsg('login-msg','Escribí tu email');
  try{await sendSignInLinkToEmail(auth,email,{url:APP_URL,handleCodeInApp:true});localStorage.setItem('emailForSignIn',email);smsg('login-msg',`✅ Link enviado a ${email}`);}
  catch(e){emsg('login-msg','Error: '+e.message);}
};
window.enviarRegistro=async function(){
  const nombre=v('r-nombre'),apellido=v('r-apellido'),dni=v('r-dni'),cel=v('r-cel'),mail=v('r-mail');
  if(!nombre||!apellido||!dni||!cel||!mail)return emsg('reg-msg','Completá todos los campos');
  await fset('config/global',{participantes:{[S.uid]:{nombre,apellido,dni,cel,mail,uid:S.uid,estado:'pendiente_aprobacion'}}});
  smsg('reg-msg','✅ Solicitud enviada');setTimeout(()=>renderEspera({nombre}),1200);
};

// Verificar pronósticos sin guardar antes de cambiar de contexto
function checkPronBuffer(msg){
  if(S.rol!=='participante')return true;
  if(!Object.keys(pronBuffer).length)return true;
  const ok=confirm(msg||'⚠️ Tenés pronósticos sin guardar.\n\n¿Continuar? Los cambios NO guardados se perderán.');
  if(ok)Object.keys(pronBuffer).forEach(k=>delete pronBuffer[k]);
  return ok;
}
window.cerrarSesion=async function(){
  if(!checkPronBuffer('⚠️ Tenés pronósticos sin guardar.\n\n¿Cerrar sesión de todas formas?'))return;
  await signOut(auth);
};

function badgePend(){
  if(S.rol!=='admin')return;
  const el=document.getElementById('bp');if(!el)return;
  const n=Object.values(allParts()).filter(p=>p.estado==='pendiente_aprobacion').length;
  if(n>0){el.textContent=n;el.style.display='';}else el.style.display='none';
}
function renderTorneosNav(){
  const nav=document.getElementById('torneos-nav');if(!nav)return;
  const ts=torneos();if(!ts.length){nav.innerHTML='<div style="font-size:12px;color:#aaa;padding:6px 10px">Sin torneos</div>';return;}
  const visible=S.rol==='admin'?ts:ts.filter(t=>{const td=S.data.torneos[t.id];return td&&(td.participantes||[]).includes(S.uid)&&t.visible!==false;});
  const activos=visible.filter(t=>t.estado!=='concluido');
  const concluidos=visible.filter(t=>t.estado==='concluido');
  const renderT=(t,concluido)=>`<div class="ni ${S.torneoActivo===t.id?'active':''}"
    onclick="selectTorneo('${t.id}')"
    style="${concluido?'opacity:.55;':''}">
    <span style="${concluido?'font-style:italic':'font-weight:500'}">${t.nombre}</span>
    <span style="display:flex;gap:3px;align-items:center">
      ${S.rol==='admin'&&t.visible===false?'<span title="Oculto para participantes" style="font-size:10px">🔒</span>':''}
      <span class="t-badge" style="font-size:9px;background:${concluido?'#6b7280':'var(--c-info)'};color:#fff;border-radius:4px;padding:1px 5px">
        ${concluido?'✓ fin':'●'}
      </span>
    </span>
  </div>`;
  // Separador plegable para concluidos
  const concluidosSec=concluidos.length?
    `<details style="margin-top:4px">
      <summary style="font-size:10px;color:#6b7280;padding:3px 10px;cursor:pointer;list-style:none;user-select:none">
        ▸ Concluidos (${concluidos.length})
      </summary>
      ${concluidos.map(t=>renderT(t,true)).join('')}
    </details>`:'';
  const wasOpen=nav.querySelector('details')?.open||false;
  nav.innerHTML=activos.map(t=>renderT(t,false)).join('')+concluidosSec;
  if(wasOpen){const d=nav.querySelector('details');if(d)d.open=true;}
}
window.selectTorneo=function(id){
  if(id===S.torneoActivo)return;
  if(!checkPronBuffer('⚠️ Tenés pronósticos sin guardar.\n\n¿Cambiar de liga? Los cambios NO guardados se perderán.'))return;
  pronFechaIdxInit=false;
  S.torneoActivo=id;
  renderShell(); // re-genera sidebar con S.torneoActivo ya seteado
  setTimeout(refreshTorneoView,50);
};
window.navTo=function(dest){
  if(!checkPronBuffer('⚠️ Tenés pronósticos sin guardar.\n\n¿Navegar? Los cambios NO guardados se perderán.'))return;
  S.torneoActivo=null;renderTorneosNav();
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+dest);if(el)el.classList.add('active');
  const c=document.getElementById('content');
  if(dest==='participantes')renderViewParts(c);
  else if(dest==='admins')renderViewAdmins(c);
  else if(dest==='miperfil')renderViewMiPerfil(c);
  else if(dest==='nuevo-torneo')renderViewNuevoTorneo(c);
  else if(dest==='vendedores')renderViewVendedores(c);

};

function refreshTorneoView(){
  const content=document.getElementById('content');if(!content||!S.torneoActivo)return;
  const t=T();if(!t){content.innerHTML='<div class="empty-state">Cargando...</div>';return;}
  // Modo lectura para torneos concluidos
  const torneoMeta=torneos().find(tt=>tt.id===S.torneoActivo);
  S.torneoLectura=torneoMeta?.estado==='concluido';
  if(_bufSLock){
    // Re-render diferido: esperar a que el usuario termine de interactuar
    setTimeout(refreshTorneoView,300);return;
  }
  const isAdmin=S.rol==='admin';
  const tabs=isAdmin?['participantes-t','equipos','fechas','pronosticos','resultados','pagos','premios','posiciones','referidos-t']:['pagos-part','mi-ref','pronosticos','resultados-hist'];
  const labels={'participantes-t':'Participantes','equipos':'Equipos','fechas':'Fechas','resultados':'Resultados','pronosticos':'Pronósticos','pagos':'Cobros','premios':'Premios','posiciones':'Posiciones','referidos-t':'🏷️ Referidos','resultados-hist':'📊 Resultados','pagos-part':'💰 Mi cuenta','mi-ref':'🏷️ Mi referido'};
  const curTab=content.dataset.activeTab;
  const activeTab=tabs.includes(curTab)?curTab:(isAdmin?'participantes-t':'pronosticos');
  const m=meta();
  content.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
        ${isAdmin
          ?`<input id="liga-nombre-input" value="${m.nombre||''}"
              style="font-size:20px;font-weight:700;border:1px solid transparent;border-radius:6px;padding:4px 8px;background:transparent;color:var(--c-text);min-width:200px;width:100%;max-width:500px"
              onblur="guardarNombreLiga(this.value)"
              onfocus="this.style.borderColor='var(--c-info)';this.style.background='var(--c-bg)'"
              title="Click para editar el nombre"/>`
          :`<span style="font-size:14px;font-weight:500">${m.nombre||''}</span>`}
        <span class="sistema-badge">${m.sistema==='1x2'?'1X2':'Resultado exacto'}</span>
      </div>
      ${isAdmin?`<button class="btn btn-sm btn-danger" onclick="eliminarTorneo()">Eliminar</button>`:''}
    </div>
    <div class="tabs">${tabs.map(id=>`<div class="tab ${id===activeTab?'active':''}" onclick="switchTab('${id}',this)">${labels[id]}</div>`).join('')}</div>
    <div id="tab-content"></div>`;
  // Preservar estado del tab-content antes de destruir el DOM
  const _vistaGuardada=content.querySelector('#tab-content')?.dataset?.vista||'';
  content.dataset.activeTab=activeTab;
  // Restaurar vista en el nuevo tab-content
  const _tc=document.getElementById('tab-content');
  if(_tc&&_vistaGuardada)_tc.dataset.vista=_vistaGuardada;
  renderTab(activeTab);
}
window.switchTab=function(id,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('content').dataset.activeTab=id;renderTab(id);};
// Restaurar estado visual del pronBuffer después de re-render
function restaurarPronBuffer(){
  Object.entries(pronBuffer).forEach(([k,val])=>{
    // k = "fi-pi-uid-signo" o "fi-pi-uid" (objeto)
    if(!k.endsWith('-signo'))return;
    const parts=k.split('-');
    if(parts.length<4)return;
    const fi=parts[0],pi=parts[1],uid=parts[2];
    ['1','X','2'].forEach(s=>{
      document.querySelectorAll(`button[onclick*="bufS(${fi},${pi},'${uid}','${s}')"]`).forEach(btn=>{
        btn.classList.remove('sel-1','sel-X','sel-2');
        if(val===s)btn.classList.add('sel-'+s);
      });
    });
    // Mostrar indicador de cambios sin guardar
    const smsgEl=document.getElementById(`smsg-${uid.slice(-6)}`);
    if(smsgEl&&val&&!smsgEl.dataset.guardado){
      smsgEl.textContent='⚠️ Cambios sin guardar';smsgEl.style.color='var(--c-warn)';
    }
  });
}

function renderTab(id){
  const el=document.getElementById('tab-content');if(!el)return;
  const fn={'participantes-t':rtParts,'equipos':rtEquipos,'fechas':rtFechas,
    'resultados':rtResultados,'pronosticos':rtPronos,'pagos':rtPagos,
    'premios':rtPremios,'posiciones':rtPos,'referidos-t':rtReferidosAdmin,'resultados-hist':rtResultadosHist,'pagos-part':rtPagosPart,'mi-ref':rtMiRef}[id];
  if(!fn){console.warn('Tab desconocido:',id);return;}
  try{
    fn(el);
    if(id==='pronosticos')setTimeout(restaurarPronBuffer,0);
    // Banner modo lectura
    if(S.torneoLectura){
      const banner=document.createElement('div');
      banner.style.cssText='background:#1f2937;color:#f9fafb;font-size:12px;padding:6px 12px;border-radius:6px;margin-bottom:10px;display:flex;align-items:center;gap:8px';
      banner.innerHTML='🔒 <strong>Torneo concluido</strong> — Solo lectura. Los datos no pueden modificarse.';
      el.insertBefore(banner,el.firstChild);
    }
  }catch(e){
    console.error('Error en tab '+id+':',e);
    el.innerHTML='<p style="color:var(--c-danger);padding:16px;font-size:13px">Error: '+e.message+'</p>';
  }
}

window.addPartManual=async function(){

  smsg('part-msg','✅ Cargado');['pn','pa','pd','pc','pm'].forEach(id=>document.getElementById(id).value='');

window.aprobarP=async function(uid){
  const notificar=document.getElementById('chk-notif-aprobar')?.checked!==false;
  await fupd('config/global',{[`participantes.${uid}.estado`]:'activo'});
  const parts=allParts();
  const content=document.getElementById('content');
  if(content&&content.innerHTML.includes('Pendientes de aprobación'))renderViewParts(content);

    const p={...parts[uid]};

  }

// ── Notif 2: Fecha activada ──────────────────────────────────
async function emailFechaActivada(fecha, fi, torneo){
  const uids=torneo.participantes||[];
  const parts=allParts();
  const promises=uids.map(uid=>{
    const p=parts[uid];
    if(!p?.mail)return;
    const cuota=`$${(fecha.cuota||torneo.cuota||500).toLocaleString()}`;
    return emailjs.send('service_fx6581p','template_notif',{
      nombre: p.nombre||'Participante',
      to_email: p.mail,
      asunto: `🟢 Nueva fecha disponible — ${torneo.nombre||'Prode'}`,
      cuerpo: `Hola ${p.nombre||''}!\n\nYa podés cargar tus pronósticos:\n\n📅 Fecha: ${fecha.nombre||`Fecha ${fi+1}`}\n🎯 Jugada N°: ${fecha.nroJugada||'—'}\n💰 Cuota: ${cuota}\n\nIngresá a la app para pronosticar:\n${APP_URL}\n\n¡Buena suerte!`,
      app_url: APP_URL,
    }).catch(e=>console.warn('Email fecha fallido para',p.mail,e));
  });
  await Promise.allSettled(promises);
  console.log('✅ Emails fecha activada enviados');
}

// ── Notif 4: Resultado publicado ─────────────────────────────
async function emailResultadoPublicado(fi, torneo){
  const uids=jugadasHabilitadasDeFecha(fi,torneo).map(j=>j.uid);
  const uniqueUids=[...new Set(uids)];
  const parts=allParts();
  const fecha=(torneo.fechas||[])[fi];
  const promises=uniqueUids.map(uid=>{
    const p=parts[uid];
    if(!p?.mail)return;
    return emailjs.send('service_fx6581p','template_notif',{
      nombre: p.nombre||'Participante',
      to_email: p.mail,
      asunto: `📊 Resultados publicados — ${fecha?.nombre||`Fecha ${fi+1}`} | ${torneo.nombre||'Prode'}`,
      cuerpo: `Hola ${p.nombre||''}!\n\nYa están disponibles los resultados de ${fecha?.nombre||`Fecha ${fi+1}`} en ${torneo.nombre||'Prode'}.\n\nIngresá a la app para ver cómo te fue:\n${APP_URL}\n\n¡Hasta la próxima!`,
      app_url: APP_URL,
    }).catch(e=>console.warn('Email resultado fallido para',p.mail,e));
  });
  await Promise.allSettled(promises);
  console.log('✅ Emails resultado publicado enviados');
}

window.crearTorneo=async function(){
  const nombre=v('nuevo-nombre');
  if(!nombre){document.getElementById('nuevo-err').textContent='El nombre es obligatorio.';return;}
  const sistema='1x2';
  const origenId=document.getElementById('nuevo-origen')?.value||'';
  const cpEquipos=document.getElementById('cp-equipos')?.checked||false;
  const cpFechas=document.getElementById('cp-fechas')?.checked||false;
  const cpPremios=document.getElementById('cp-premios')?.checked||false;
  const cpSaldos=document.getElementById('cp-saldos')?.checked||false;
  const id='torneo_'+Date.now();

  // Datos base del nuevo torneo
  let nuevoData={participantes:[],equipos:[],fechas:[],pronosticos:{},resultados:{},
    resultadosPublicados:{},ausencias:{},pagosDetalle:{},cuota:500,premiosCfg:{}};

  if(origenId){
    const origen=S.data.torneos[origenId];
    if(!origen){document.getElementById('nuevo-err').textContent='No se encontró el torneo origen.';return;}

    if(cpEquipos)nuevoData.equipos=JSON.parse(JSON.stringify(origen.equipos||[]));

    if(cpFechas){
      // Copiar fechas: resetear estado a planificada, limpiar pronósticos/resultados/nroJugada auto
      // Calcular el máximo nroJugada global (todos los torneos) para continuar desde ahí
      let ultimoNroJ=0;
      Object.values(S.data.torneos||{}).forEach(td=>{
        (td.fechas||[]).forEach(f=>{
          const n=parseInt(f.nroJugada)||0;
          if(n>0&&n<100000&&n>ultimoNroJ)ultimoNroJ=n;
        });
      });
      console.log('ultimoNroJ global:',ultimoNroJ);
      nuevoData.fechas=(origen.fechas||[]).map((f,i)=>({
        nombre:f.nombre,
        numero:f.numero||null,
        nroJugada:ultimoNroJ+i+1, // continúa desde el último
        estado:'planificada',
        cuota:f.cuota||null,
        partidos:(f.partidos||[]).map(p=>({local:p.local,visita:p.visita})) // solo cruces, sin scores
      }));
    }

    if(cpPremios&&origen.premiosCfg){
      const {pct1,pct2,pct3,pctRetiro,err1,err2,err3}=origen.premiosCfg;
      nuevoData.premiosCfg={pct1,pct2,pct3,pctRetiro,err1,err2,err3,
        pozoInicial:0,pozosManual:{}}; // pozo inicial en 0, lo ajusta el admin
      nuevoData.cuota=origen.cuota||500;
    }


  }

  await fupd('config/global',{torneos:[...torneos(),{id,nombre,sistema,visible:false}]});
  await fset(`torneos/${id}`,nuevoData);
  // Inicializar en memoria para que selectTorneo funcione antes del listener
  if(!S.data.torneos)S.data.torneos={};
  S.data.torneos[id]=nuevoData;
  S.torneoActivo=id;
  renderShell();
  setTimeout(()=>selectTorneo(id),600);
};;

window.eliminarTorneo=async function(){
  const id=S.torneoActivo;
  if(!id){alert('Error: no se puede identificar el torneo.');return;}
  // FIX 2b: verificar que no haya pronósticos en ninguna fecha
  const td=S.data.torneos[id]||{};
  const prons=td.pronosticos||{};
  if(Object.keys(prons).length>0){
    alert('No se puede eliminar esta liga porque ya hay pronósticos cargados de participantes en alguna fecha.');return;

  if(!confirm('¿Eliminar esta liga y todos sus datos? Esta acción no se puede deshacer.'))return;
  const nuevos=torneos().filter(t=>t.id&&t.id!==id);

  renderTorneosNav();
  document.getElementById('content').innerHTML='<div class="empty-state">Seleccioná un torneo</div>';
};

  const busqP=el.dataset.busqParts||'';
  el.innerHTML=`

    style="width:100%;max-width:360px;padding:6px 10px;font-size:13px;border:1px solid var(--c-border);border-radius:8px;background:var(--c-bg);color:var(--c-text);margin-bottom:8px;display:block"
    id="busq-parts-input" oninput="filtrarListaParts(this.value)"/>

    ${!act.length?'<p class="sub">No hay participantes activos aún.</p>':act.filter(([uid,p])=>{
      if(!busqP)return true;
      const q=busqP.toLowerCase();
      return (p.nombre+' '+p.apellido+' '+p.mail+' '+p.dni).toLowerCase().includes(q);

      return`<div class="part-check-row ${ok?'assigned':''}"><div><span style="font-weight:500">${p.nombre} ${p.apellido}</span> <span style="font-size:11px;color:var(--c-text2)">${[p.mail,p.dni].filter(Boolean).join(' · ')}</span></div><button class="btn btn-sm ${ok?'btn-danger':'btn-primary'}" onclick="togglePT('${uid}')">${ok?'Quitar':'Agregar'}</button></div>`;
    }).join('')}`;
  // Buscador via DOM filter (sin re-render)
  const busqInpP=el.querySelector('#busq-parts-input');
  if(busqInpP){
    busqInpP.addEventListener('input',function(){
      const q=this.value.toLowerCase();

      });
    });
  }
}

  const porCat={};
  equipos.forEach((e,i)=>{
    const cat=equipoCategoria(e)||'Sin categoría';
    if(!porCat[cat])porCat[cat]=[];
    porCat[cat].push({e,i});
  });
  const listaHTML=Object.entries(porCat).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,items])=>`
    <div style="margin-bottom:8px">
      <p style="font-size:11px;font-weight:600;color:var(--c-text2);margin-bottom:4px">Categoría ${cat}</p>
      <div class="chips">${items.map(({e,i})=>`<span class="chip">${equipoNombre(e)}<span class="x" onclick="editEquipo(${i})">✏</span><span class="x" onclick="removeEquipo(${i})">✕</span></span>`).join('')}</div>
    </div>`).join('');
  el.innerHTML=`<p class="sub" style="margin-top:4px">Equipos de este torneo agrupados por categoría.</p>
    <div class="card" style="max-width:460px">
      <div class="row">
        <input id="eq-input" placeholder="Nombre del equipo..." style="flex:2"/>
        <select id="eq-cat" style="flex:1;max-width:80px">
          ${CATEGORIAS.map(c=>`<option value="${c}">${c}</option>`).join('')}
        </select>
        <button class="btn btn-primary btn-sm" onclick="addEquipo()">Agregar</button>
      </div>
      <p id="eq-msg" style="font-size:12px;min-height:14px;margin-top:4px"></p>
    </div>
    <div id="eq-edit-wrap"></div>
    ${listaHTML||'<p class="sub">Sin equipos aún.</p>'}`;

window.editEquipo=function(i){
  const t=T();if(!t)return;
  const e=t.equipos[i];
  const wrap=document.getElementById('eq-edit-wrap');if(!wrap)return;
  const nombre=equipoNombre(e);const cat=equipoCategoria(e);
  wrap.innerHTML=`<div class="card" style="max-width:460px;border-color:var(--c-info-border)">
    <p style="font-size:12px;font-weight:500;margin-bottom:6px">Editando: <strong>${nombre}</strong></p>
    <div class="row">
      <input id="eq-edit-nombre" value="${nombre}" style="flex:2"/>
      <select id="eq-edit-cat" style="flex:1;max-width:80px">
        ${CATEGORIAS.map(c=>`<option value="${c}" ${c===cat?'selected':''}>${c}</option>`).join('')}
      </select>
      <button class="btn btn-primary btn-sm" onclick="guardarEditEquipo(${i})">Guardar</button>
      <button class="btn btn-sm" onclick="document.getElementById('eq-edit-wrap').innerHTML=''">✕</button>
    </div>
  </div>`;
};
window.guardarEditEquipo=async function(i){
  const nombre=document.getElementById('eq-edit-nombre')?.value.trim();
  const cat=document.getElementById('eq-edit-cat')?.value||'A';
  if(!nombre)return;
  const t=T();if(!t)return;
  const lista=JSON.parse(JSON.stringify(t.equipos||[]));
  lista[i]={nombre,categoria:cat};
  await fupd(`torneos/${S.torneoActivo}`,{equipos:lista});
};
window.addEquipo=async function(){
  const val=v('eq-input');if(!val)return;
  const cat=document.getElementById('eq-cat')?.value||'A';
  const t=T();if(!t)return;
  const lista=JSON.parse(JSON.stringify(t.equipos||[]));
  if(lista.find(e=>equipoNombre(e).toLowerCase()===val.toLowerCase())){
    const msg=document.getElementById('eq-msg');
    if(msg){msg.textContent='Ya existe un equipo con ese nombre.';msg.style.color='var(--c-danger)';}
    return;
  }
  lista.push({nombre:val,categoria:cat});
  await fupd(`torneos/${S.torneoActivo}`,{equipos:lista});
  document.getElementById('eq-input').value='';
};
window.removeEquipo=async function(i){const t=T();if(!t)return;const lista=JSON.parse(JSON.stringify(t.equipos||[]));lista.splice(i,1);await fupd(`torneos/${S.torneoActivo}`,{equipos:lista});};

// ── TAB FECHAS ───────────────────────────────────────────────
function libres(fi){const t=T();if(!t)return[];const u=new Set();(t.fechas?.[fi]?.partidos||[]).forEach(p=>{u.add(p.local);u.add(p.visita);});return(t.equipos||[]).filter(e=>!u.has(equipoNombre(e)));}
function usadosEnFecha(fi){const t=T();if(!t)return new Set();const u=new Set();(t.fechas?.[fi]?.partidos||[]).forEach(p=>{u.add(p.local);u.add(p.visita);});return u;}
function optsLocal(fi){
  const t=T();if(!t)return'';
  const usados=usadosEnFecha(fi);
  const disponibles=(t.equipos||[]).filter(e=>!usados.has(equipoNombre(e)));
  // Agrupar por categoría
  const porCat={};
  disponibles.forEach(e=>{const c=equipoCategoria(e)||'Sin cat.';if(!porCat[c])porCat[c]=[];porCat[c].push(e);});
  return Object.entries(porCat).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,eqs])=>
    `<optgroup label="Categoría ${cat}">${eqs.sort((a,b)=>equipoNombre(a).localeCompare(equipoNombre(b),'es')).map(e=>`<option value="${equipoNombre(e)}">${equipoNombre(e)}</option>`).join('')}</optgroup>`
  ).join('');
}
// Valor seleccionado de visita por fecha (mantenemos para compatibilidad con addPartido)
const visitaSeleccionada={};

function optsVisita(fi,localSel){
  const t=T();if(!t)return'';
  const usados=usadosEnFecha(fi);
  const disponibles=(t.equipos||[]).filter(e=>equipoNombre(e)!==localSel&&!usados.has(equipoNombre(e)));
  const porCat={};
  disponibles.forEach(e=>{const c=equipoCategoria(e)||'Sin cat.';if(!porCat[c])porCat[c]=[];porCat[c].push(e);});
  return Object.entries(porCat).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,eqs])=>
    `<optgroup label="Categoría ${cat}">${eqs.sort((a,b)=>equipoNombre(a).localeCompare(equipoNombre(b),'es')).map(e=>`<option value="${equipoNombre(e)}">${equipoNombre(e)}</option>`).join('')}</optgroup>`
  ).join('');
}
function cruceDup(local,visita,fi){const t=T();if(!t)return null;for(let i=0;i<(t.fechas||[]).length;i++){if(i===fi)continue;const f=t.fechas[i];const e=(f.partidos||[]).find(p=>(p.local===local&&p.visita===visita)||(p.local===visita&&p.visita===local));if(e)return{fi:i,nombre:f.nombre,inv:(e.local===visita)};}return null;}

let editandoFecha=-1; // índice de la fecha que se está editando (-1 = ninguna)

window.iniciarEditFecha=function(fi){editandoFecha=fi;renderTab('fechas');};
window.cancelarEditFecha=function(){editandoFecha=-1;renderTab('fechas');};
window.guardarEditFecha=async function(fi){
  const t=T();if(!t)return;
  const numero=document.getElementById('edit-num-'+fi)?.value;
  const nombre=document.getElementById('edit-nombre-'+fi)?.value.trim();
  const inicio=document.getElementById('edit-inicio-'+fi)?.value;
  const nroJugadaEdit=document.getElementById('edit-jugada-'+fi)?.value;
  const cuotaEditVal=parseFloat(document.getElementById('edit-cuota-'+fi)?.value)||null;
  const msgEl=document.getElementById('edit-msg-'+fi);
  const showErr=msg=>{if(msgEl){msgEl.textContent=msg;msgEl.style.color='var(--c-danger)';}else alert(msg);};
  if(!nombre)return showErr('El nombre es obligatorio.');
  if(!numero)return showErr('El número de fecha es obligatorio.');
  if(!nroJugadaEdit)return showErr('El número de jugada es obligatorio.');
  const fechas=t.fechas||[];
  if(fechas.some((f,i)=>i!==fi&&String(f.numero)===String(numero)))return showErr(`Ya existe la fecha número ${numero}.`);
  if(fechas.some((f,i)=>i!==fi&&f.nombre.toLowerCase()===nombre.toLowerCase()))return showErr('Ya existe una fecha con ese nombre.');
  if(nroJugadaEdit&&fechas.some((f,i)=>i!==fi&&String(f.nroJugada)===String(nroJugadaEdit)))return showErr(`Ya existe la Jugada N° ${nroJugadaEdit}.`);
  const nuevas=JSON.parse(JSON.stringify(fechas));
  nuevas[fi]={...nuevas[fi],nombre,numero:parseInt(numero),nroJugada:nroJugadaEdit?parseInt(nroJugadaEdit):null,inicio:inicio||null,
    ...(cuotaEditVal?{cuota:cuotaEditVal}:{})};
  await fupd(`torneos/${S.torneoActivo}`,{fechas:nuevas});
  editandoFecha=-1;
};

window.ordenarFechas=async function(dir){
  const t=T();if(!t)return;
  const fechas=JSON.parse(JSON.stringify(t.fechas||[]));
  fechas.sort((a,b)=>{
    const na=a.numero||0,nb=b.numero||0;
    return dir==='asc'?na-nb:nb-na;
  });
  await fupd(`torneos/${S.torneoActivo}`,{fechas});
};

window.toggleFechaCard=function(header){
  const body=header.parentElement.querySelector('.fecha-card-body');
  const arrow=header.querySelector('.fecha-toggle-arrow');
  if(!body)return;
  const fi=parseInt(header.parentElement.dataset.fi||'-1');
  const abierto=body.style.display!=='none';
  body.style.display=abierto?'none':'block';
  if(arrow)arrow.textContent=abierto?'▼':'▲';
  if(abierto)fechasExpandidas.delete(fi); else fechasExpandidas.add(fi);
};

window.addFecha=async function(){
  const nombre=v('f-nombre');const numero=v('f-num');const inicio=v('f-inicio');
  const nroJugadaStr=v('f-jugada');
  if(!nombre)return emsg('fecha-msg','El nombre es obligatorio');
  if(!numero)return emsg('fecha-msg','El número de fecha es obligatorio');
  const t=T();if(!t)return;const fechas=t.fechas||[];
  if(fechas.find(f=>String(f.numero)===String(numero)))return emsg('fecha-msg',`Ya existe la fecha número ${numero}`);
  if(nroJugadaStr&&fechas.find(f=>String(f.nroJugada)===String(nroJugadaStr)))return emsg('fecha-msg',`Ya existe la Jugada N° ${nroJugadaStr}`);
  if(fechas.find(f=>f.nombre.toLowerCase()===nombre.toLowerCase()))return emsg('fecha-msg','Ya existe una fecha con ese nombre');
  const nroJugada=nroJugadaStr?parseInt(nroJugadaStr):null;
  const cuota=parseFloat(document.getElementById('f-cuota')?.value)||t.cuota||500;
  await fupd(`torneos/${S.torneoActivo}`,{fechas:[...fechas,{nombre,numero:parseInt(numero),nroJugada,cuota,inicio:inicio||null,partidos:[],estado:'planificada'}]});
  document.getElementById('f-nombre').value='';document.getElementById('f-inicio').value='';
  // Proponer siguiente nro, cuota y jugada
  const t2=T();if(t2){
    const fs2=t2.fechas||[];
    const nums2=fs2.map(f=>parseInt(f.numero||0)).filter(n=>n>0);
    const ni=document.getElementById('f-num');if(ni)ni.value=nums2.length?Math.max(...nums2)+1:1;
    const ul=fs2.filter(f=>f.cuota).slice(-1)[0];
    const ci=document.getElementById('f-cuota');if(ci)ci.value=ul?.cuota??t2.cuota??500;
    const jugs2=fs2.map(f=>parseInt(f.nroJugada||0)).filter(n=>n>0);
    const ji=document.getElementById('f-jugada');if(ji)ji.value=jugs2.length?Math.max(...jugs2)+1:'';
  }
};

window.cambiarEstado=async function(fi,nuevoEstado){
  const t=T();if(!t)return;
  const fechas=JSON.parse(JSON.stringify(t.fechas||[]));
  const f=fechas[fi];
  // FIX 1b: bloquear si Terminada y ya tiene premios asignados
  if(f.estado==='terminada'&&t.premiosPublicados?.[fi]){
    alert(`La fecha "${f.nombre}" ya tiene premios publicados y no puede modificarse.`);
    refreshTorneoView();return;
  }
  if(nuevoEstado==='activa'||nuevoEstado==='en ejecucion'){
    const otra=fechas.findIndex((f,i)=>i!==fi&&(f.estado==='activa'||f.estado==='en ejecucion'));
    if(otra>=0){
      alert(`Ya hay una fecha en estado "${ESTADO_LABEL[fechas[otra].estado]}": "${fechas[otra].nombre}".\nCambiá su estado antes de activar otra.`);
      refreshTorneoView();return;
    }
  }
  // FIX 9: para pasar a "terminada", todos los resultados deben estar cargados
  if(nuevoEstado==='terminada'){
    const fActual=fechas[fi];
    const partidos=fActual.partidos||[];
    if(!partidos.length){alert('No hay partidos cargados en esta fecha.');refreshTorneoView();return;}
    const resultados=T()?.resultados||{};
    const faltantes=partidos.filter((_,pi)=>!resultados[`${fi}-${pi}-signo`]);
    if(faltantes.length>0){

window.duplicarFechas=function(){
  const t=T();if(!t)return;
  const fechas=t.fechas||[];if(!fechas.length)return alert('No hay fechas configuradas.');

  // Recopilar todos los pares existentes local-visita
  const paresExistentes=new Set();
  fechas.forEach(f=>(f.partidos||[]).forEach(p=>{
    if(p.local&&p.visita)paresExistentes.add(`${p.local}||${p.visita}`);
  }));

  // Calcular los pares que generaría la inversión
  const paresNuevos=new Set();
  const colisiones=[];
  fechas.forEach(f=>(f.partidos||[]).forEach(p=>{
    if(p.local&&p.visita){
      const clave=`${p.visita}||${p.local}`; // invertido
      if(paresExistentes.has(clave)){
        if(!colisiones.find(c=>c===`${p.visita} vs ${p.local}`))
          colisiones.push(`${p.visita} vs ${p.local}`);
      } else {
        paresNuevos.add(clave);
      }
    }
  }));

  // Calcular total de cruces posibles con los equipos del torneo
  const equipos=t.equipos||[];
  const totalPosible=equipos.length*(equipos.length-1);
  const yaConfigurados=paresExistentes.size;
  const maxNum=Math.max(0,...fechas.map(f=>f.numero||0));

  // Armar el modal de confirmación
  const existeModal=document.getElementById('modal-dup-inv');
  if(existeModal)existeModal.remove();
  const div=document.createElement('div');
  div.id='modal-dup-inv';
  div.style.cssText='display:block;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;overflow-y:auto';

  let body='';
  if(colisiones.length>0){
    // BLOQUEO: hay colisiones
    body=`
      <p style="font-size:13px;margin-bottom:12px">
        Se generarían <strong>${fechas.length} fechas nuevas</strong>
        (Fecha ${maxNum+1} a Fecha ${maxNum+fechas.length}).
      </p>
      <div style="background:#fee2e2;border:1px solid #fca5a5;border-radius:8px;padding:12px;margin-bottom:12px">
        <p style="font-size:13px;font-weight:600;color:#dc2626;margin-bottom:8px">
          🚫 No se puede generar — ${colisiones.length} cruce${colisiones.length!==1?'s ya existen':'ya existe'} como partido configurado:
        </p>
        <ul style="font-size:12px;color:#7f1d1d;margin:0;padding-left:16px;max-height:160px;overflow-y:auto">
          ${colisiones.map(c=>`<li>${c}</li>`).join('')}
        </ul>
        <p style="font-size:12px;color:#7f1d1d;margin-top:8px">
          Eliminá esos cruces antes de duplicar, o cargá las fechas de vuelta a mano.
        </p>
      </div>
      ${totalPosible>0?`<p style="font-size:12px;color:var(--c-text2)">Cruces configurados: ${yaConfigurados} de ${totalPosible} posibles</p>`:''}
      <div style="display:flex;justify-content:flex-end;margin-top:14px">
        <button class="btn" onclick="document.getElementById('modal-dup-inv').remove()">Cerrar</button>
      </div>`;
  } else {
    // SIN COLISIONES: pedir confirmación
    body=`
      <p style="font-size:13px;margin-bottom:12px">
        Se generarán <strong>${fechas.length} fechas nuevas</strong>
        (Fecha ${maxNum+1} a Fecha ${maxNum+fechas.length}),
        con los partidos invertidos (local ↔ visita) de cada fecha existente.
      </p>
      <div style="background:var(--c-bg2);border-radius:8px;padding:10px;margin-bottom:12px">
        <p style="font-size:12px;font-weight:500;margin-bottom:4px">Fechas que se generarán:</p>
        <ul style="font-size:12px;color:var(--c-text2);margin:0;padding-left:16px;max-height:160px;overflow-y:auto">
          ${[...fechas].map((f,i)=>`<li>Fecha ${maxNum+i+1} — inversión de ${f.nombre||'Fecha '+(f.numero||i+1)}</li>`).join('')}
        </ul>
      </div>
      ${totalPosible>0?`<p style="font-size:12px;color:var(--c-text2);margin-bottom:12px">Cruces configurados: ${yaConfigurados} de ${totalPosible} posibles</p>`:''}
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:14px">
        <button class="btn" onclick="document.getElementById('modal-dup-inv').remove()">Cancelar</button>
        <button class="btn btn-primary" onclick="ejecutarDuplicar()">✓ Generar fechas</button>
      </div>`;
  }

  div.innerHTML=`<div style="background:var(--c-bg);border-radius:12px;max-width:480px;margin:8vh auto;padding:20px;box-shadow:0 8px 30px rgba(0,0,0,.3)">
    <h3 style="font-size:15px;font-weight:600;margin:0 0 14px">🔄 Duplicar e invertir local/visita</h3>
    ${body}
  </div>`;
  document.body.appendChild(div);
};

// Helper: crear tabla Excel nativa (reconocida por Excel) + descargar
window._excelWriteTable=function(wb, sheetName, cols, data, totalsMap, fileName){
  const ws=wb.addWorksheet(sheetName);
  // Agregar datos al sheet primero (requerido por addTable)
  const allRows=[cols.map(c=>c.header), ...data];
  allRows.forEach(row=>ws.addRow(row));
  // Crear tabla Excel nativa con estilo
  ws.addTable({
    name: sheetName.replace(/[^a-zA-Z0-9]/g,'_'),
    ref: 'A1',
    headerRow: true,
    totalsRow: !!(totalsMap && Object.keys(totalsMap).length),
    style: {theme:'TableStyleMedium2', showRowStripes:true},
    columns: cols.map((c,i)=>({
      name: c.header,
      filterButton: true,
      totalsRowFunction: (totalsMap && totalsMap[i]) || 'none',
      totalsRowLabel: (totalsMap && totalsMap[i]==='none'&&i===0)?'Total':'',
    })),
    rows: data,
  });
  // Anchos de columna
  ws.columns=cols.map(c=>({width:c.width||14}));
  // Freeze header
  ws.views=[{state:'frozen',xSplit:0,ySplit:1}];
  // Formato moneda en columnas indicadas
  cols.forEach((c,ci)=>{
    if(c.currency){
      ws.getColumn(ci+1).eachCell({includeEmpty:false},(cell,ri)=>{
        if(ri>1&&typeof cell.value==='number')cell.numFmt='"$"#,##0';
      });
    }
  });
  wb.xlsx.writeBuffer().then(buf=>{
    const blob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=fileName;a.click();
  });
};

// Helper: obtener vendedores de config global
function getVendedores(){return (cfg()?.vendedores||[]);}

// Helper: código vigente de un uid para una fi en el torneo
function codigoRefParaFi(uid, fi, t){
  const hist=t.codigosRef?.[uid]||[];
  const reg=hist.filter(r=>r.desde<=fi&&(r.hasta===null||r.hasta===undefined||r.hasta>=fi));
  return reg.length?reg[reg.length-1].codigo:null;
}

// Helper: vendedor por código
function vendedorPorCodigo(codigo){
  return getVendedores().find(v=>v.codigo===codigo)||null;
}

window.guardarRefRow=async function(){
  const t=T();if(!t)return;
  const uid=S.uid;
  const codigo=document.getElementById('ref-row-codigo').value.trim().toUpperCase();
  const desdeStr=document.getElementById('ref-row-desde').value;
  const hastaStr=document.getElementById('ref-row-hasta').value;
  const idxStr=document.getElementById('ref-row-idx').value;
  const errEl=document.getElementById('ref-row-err');
  if(!codigo){errEl.textContent='El código es obligatorio.';return;}
  const vend=vendedorPorCodigo(codigo);
  if(!vend){errEl.textContent=`❌ El código "${codigo}" no corresponde a ningún vendedor registrado.`;return;}
  const desde=desdeStr!==''?parseInt(desdeStr):null;
  const hasta=hastaStr!==''?parseInt(hastaStr):null;
  if(desde!==null&&hasta!==null&&hasta<desde){errEl.textContent='La fecha fin no puede ser anterior a la fecha inicio.';return;}
  const hist=JSON.parse(JSON.stringify(t.codigosRef?.[uid]||[]));
  const idxNum=idxStr!==''?parseInt(idxStr):-1;
  // Si la nueva entrada es vigente (hasta=null) y hay otra vigente, cerrar la anterior
  // Si hay solapamiento con entradas cerradas, rechazar
  for(let ri=0;ri<hist.length;ri++){
    if(ri===idxNum)continue;
    const r=hist[ri];
    const rHasta=r.hasta!==null&&r.hasta!==undefined?r.hasta:99999;
    const rDesde=r.desde!==null&&r.desde!==undefined?r.desde:0;
    const nDesde=desde!==null?desde:0;
    const nHasta=hasta!==null?hasta:99999;
    const esVigente=(r.hasta===null||r.hasta===undefined);
    if(esVigente){
      // Cerrar automáticamente la entrada vigente anterior con hasta=desde-1
      const cierreAuto=nDesde>0?nDesde-1:null;
      hist[ri]={...r,hasta:cierreAuto};
    } else if(nDesde<=rHasta&&nHasta>=rDesde){
      // Solapamiento con entrada cerrada → error
      const fechas=t.fechas||[];
      const fD=fechas[rDesde]?.nombre||`Fecha ${rDesde}`;
      const fH=fechas[rHasta]?.nombre||`Fecha ${rHasta}`;
      errEl.textContent=`❌ Se solapa con el código ${r.codigo} (${fD} — ${fH}).`;
      return;
    }
  }
  const obj={codigo,desde,hasta};
  if(idxNum>=0)hist[idxNum]=obj; else hist.push(obj);
  const u={};u[`codigosRef.${uid}`]=hist;
  await fupd(`torneos/${S.torneoActivo}`,u);
  cerrarModalRefRow();
  renderTab('mi-ref');
};

window.guardarCodigoRef=async function(){
  const t=T();if(!t)return;
  const uid=S.uid;
  const codigo=document.getElementById('inp-ref-codigo').value.trim().toUpperCase();
  const msgEl=document.getElementById('ref-msg');
  const fechas=t.fechas||[];
  // Encontrar la fi actual (la primera activa o en ejecución, o la longitud del array)
  const fiActual=Math.max(0,fechas.findIndex(f=>f.estado==='activa'||f.estado==='en ejecucion'));
  const fi=fiActual>=0?fiActual:fechas.length;
  const hist=JSON.parse(JSON.stringify(t.codigosRef?.[uid]||[]));
  // Cerrar el registro vigente
  const vigIdx=hist.findIndex(r=>r.hasta===null||r.hasta===undefined);
  if(vigIdx>=0){
    if(hist[vigIdx].codigo===codigo){
      msgEl.style.color='var(--c-text2)';msgEl.textContent='Ya tenés ese código asignado.';return;
    }
    hist[vigIdx].hasta=Math.max(0,fi-1);
  }
  // Validar que el código exista en la lista de vendedores
  if(codigo){
    const vend=vendedorPorCodigo(codigo);
    if(!vend){
      msgEl.style.color='var(--c-danger)';
      msgEl.textContent=`❌ El código "${codigo}" no corresponde a ningún vendedor registrado.`;
      return;
    }
    hist.push({codigo,desde:fi,hasta:null});
  }
  const update={};
  update[`codigosRef.${uid}`]=hist;
  await fupd(`torneos/${S.torneoActivo}`,update);
  msgEl.style.color='var(--c-success)';
  msgEl.textContent=codigo?`✅ Código ${codigo} guardado (${vendedorPorCodigo(codigo)?.nombre||''}).`:'Código eliminado.';
  renderTab('mi-ref');
};

window.exportarComisionesExcel=function(){
  const t=T();if(!t)return;
  const fechas=t.fechas||[];
  const vends=getVendedores();
  window._loadExcelJS(function(){
    const wb=new ExcelJS.Workbook();wb.creator='Prode Fútbol';
    const fechaHdrs=fechas.flatMap(f=>[
      {header:`${f.nombre} - Rec.`,width:14,currency:true},
      {header:`${f.nombre} - Comisión`,width:14,currency:true},
    ]);
    const cols=[
      {header:'Vendedor',width:22},{header:'Apellido',width:16},
      {header:'DNI',width:12},{header:'Código',width:10},{header:'% Comisión',width:10},
      ...fechaHdrs,
      {header:'Total Recaudado',width:16,currency:true},
      {header:'Total Comisión',width:16,currency:true},
    ];
    const data=vends.map(vend=>{
      const celdas=fechas.map((f,fi)=>{
        const cuota=f.cuota??t.cuotasFecha?.[fi]??t.cuota??500;
        const uids=t.participantes||[];
        let jugadas=0;
        uids.forEach(uid=>{
          if(codigoRefParaFi(uid,fi,t)===vend.codigo)jugadas+=nJugadasHabilitadas(fi,uid,t);
        });
        const recaudado=jugadas*cuota;
        return[recaudado,Math.round(recaudado*(vend.pct||0)/100)];
      });
      const flatCeldas=celdas.flat();
      const totalRec=celdas.reduce((s,c)=>s+c[0],0);
      const totalCom=celdas.reduce((s,c)=>s+c[1],0);
      return[vend.nombre,vend.apellido,vend.dni||'',vend.codigo,vend.pct||0,...flatCeldas,totalRec,totalCom];
    });
    const totals={0:'none'};
    // Totales en columnas de moneda
    for(let i=5;i<5+fechas.length*2+2;i++)totals[i]='sum';
    const liga=t.nombre||'Prode';
    window._excelWriteTable(wb,'Comisiones Vendedores',cols,data,totals,`${liga}_comisiones.xlsx`);
  });
};

// Calcular deuda de un vendedor = suma de comisiones de fechas TERMINADAS
// en todos los torneos donde sus referidos jugaron
function calcDeudaVendedor(codigoVend){
  let total=0;
  const ts=Object.entries(S.data.torneos||{});
  ts.forEach(([tid,t])=>{
    if(!t||!t.fechas)return;
    const fechas=t.fechas||[];
    const vend=vendedorPorCodigo(codigoVend);
    if(!vend)return;
    fechas.forEach((f,fi)=>{
      if(f.estado!=='terminada')return; // solo terminadas
      const cuota=f.cuota??t.cuotasFecha?.[fi]??t.cuota??500;
      const uids=t.participantes||[];
      uids.forEach(uid=>{
        const cod=codigoRefParaFi(uid,fi,t);
        if(cod===codigoVend){
          const jugadas=nJugadasHabilitadas(fi,uid,t);
          total+=jugadas*cuota*(vend.pct||0)/100;
        }
      });
    });
  });
  return Math.round(total);
}

window.guardarPagoVend=async function(){
  const codigo=document.getElementById('pv-codigo').value;
  const fecha=document.getElementById('pv-fecha').value;
  const monto=parseFloat(document.getElementById('pv-monto').value)||0;
  const forma=document.getElementById('pv-forma').value;
  const nota=document.getElementById('pv-nota').value.trim();
  const editIdxStr=document.getElementById('pv-edit-idx').value;
  const errEl=document.getElementById('pv-err');
  if(!codigo){errEl.textContent='Seleccioná un vendedor.';return;}
  if(!fecha||monto<=0){errEl.textContent='Fecha y monto son obligatorios.';return;}
  const pagos=JSON.parse(JSON.stringify(cfg()?.pagosVendedores||[]));
  const obj={codigo,fecha,monto,forma,nota,ts:new Date().toISOString()};
  const editIdx=editIdxStr!==''?parseInt(editIdxStr):-1;
  if(editIdx>=0)pagos[editIdx]=obj; else pagos.push(obj);
  await fupd('config/global',{pagosVendedores:pagos});
  cerrarModalPagoVend();
  const c=document.getElementById('content');if(c)renderViewCCVendedores(c);
};

window.saveRefAdmin=async function(uid){
  const t=T();if(!t)return;
  const codigo=document.getElementById('raf-codigo').value.trim().toUpperCase();
  const desdeStr=document.getElementById('raf-desde').value;
  const hastaStr=document.getElementById('raf-hasta').value;
  const idxStr=document.getElementById('raf-idx').value;
  const errEl=document.getElementById('raf-err');
  if(!codigo){errEl.textContent='Código obligatorio.';return;}
  if(!vendedorPorCodigo(codigo)){errEl.textContent=`Código "${codigo}" no registrado.`;return;}
  const desde=desdeStr!==''?parseInt(desdeStr):null;
  const hasta=hastaStr!==''?parseInt(hastaStr):null;
  if(desde!==null&&hasta!==null&&hasta<desde){errEl.textContent='Fecha fin no puede ser anterior al inicio.';return;}
  const hist=JSON.parse(JSON.stringify(t.codigosRef?.[uid]||[]));
  const idxNum=idxStr!==''?parseInt(idxStr):-1;
  // Validar solapamiento
  for(let ri2=0;ri2<hist.length;ri2++){
    if(ri2===idxNum)continue;
    const r=hist[ri2];
    const rD=r.desde!==null&&r.desde!==undefined?r.desde:0;
    const rH=r.hasta!==null&&r.hasta!==undefined?r.hasta:99999;
    const nD=desde!==null?desde:0;const nH=hasta!==null?hasta:99999;
    if(nD<=rH&&nH>=rD){errEl.textContent=`Se solapa con código ${r.codigo}.`;return;}
  }
  const obj={codigo,desde,hasta};
  if(idxNum>=0)hist[idxNum]=obj; else hist.push(obj);
  const u={};u[`codigosRef.${uid}`]=hist;
  await fupd(`torneos/${S.torneoActivo}`,u);
  abrirRefAdmin(uid);
};

window.exportarMovsVendedor=function(codigo){
  const vend=vendedorPorCodigo(codigo);
  const allPagos=cfg()?.pagosVendedores||[];
  const movs=allPagos.filter(p=>p.codigo===codigo).sort((a,b)=>(b.fecha||'').localeCompare(a.fecha||''));
  const deuda=calcDeudaVendedor(codigo);
  const totalPagado=movs.reduce((s,p)=>s+p.monto,0);
  const saldo=totalPagado-deuda;
  window._loadExcelJS(function(){
    const wb=new ExcelJS.Workbook();wb.creator='Prode Fútbol';
    const apellido=vend?vend.apellido||'':'';
    const nombre=vend?vend.nombre||'':'';
    const fileName=`${apellido}_${nombre}_${codigo}.xlsx`.replace(/\s+/g,'_');
    // Solapa 1: Resumen
    const wsRes=wb.addWorksheet('Resumen');
    wsRes.columns=[{width:22},{width:18}];
    const hRow=wsRes.addRow(['Resumen Cuenta Vendedor','']);
    hRow.font={bold:true,size:13};
    wsRes.addRow([]);
    wsRes.addRow(['Vendedor',vend?`${vend.nombre} ${vend.apellido}`:codigo]);
    wsRes.addRow(['DNI',vend?.dni||'—']);
    wsRes.addRow(['Código',codigo]);
    wsRes.addRow(['% Comisión',(vend?.pct||0)+'%']);
    wsRes.addRow([]);
    const rDeuda=wsRes.addRow(['Deuda Generada',deuda]);
    rDeuda.getCell(2).numFmt='"$"#,##0';rDeuda.getCell(2).font={bold:true,color:{argb:'FFDC2626'}};
    const rPag=wsRes.addRow(['Total Pagado',totalPagado]);
    rPag.getCell(2).numFmt='"$"#,##0';rPag.getCell(2).font={bold:true,color:{argb:'FF16A34A'}};
    const rSaldo=wsRes.addRow(['Saldo',saldo]);
    rSaldo.getCell(2).numFmt='"$"#,##0';
    rSaldo.getCell(2).font={bold:true,color:{argb:saldo>=0?'FF16A34A':'FFDC2626'}};
    // Solapa 2: Movimientos
    const cols=[
      {header:'Fecha',width:14},{header:'Monto',width:14,currency:true},
      {header:'Forma',width:16},{header:'Nota',width:30},
    ];
    const data=movs.map(p=>[p.fecha||'',p.monto||0,p.forma||'',p.nota||'']);
    window._excelWriteTable(wb,'Movimientos',cols,data,{0:'none',1:'sum'},fileName);
  });
};

function rtReferidosAdmin(el){
  const t=T();if(!t)return;
  const activeTab=window._refSubTab||'comisiones';
  const tabBtn=(id,label)=>`<button class="btn btn-sm ${activeTab===id?'btn-primary':''}" style="margin-right:4px"
    onclick="cambiarSubTabRef('${id}')">${label}</button>`;
  const tabsHTML=`<div style="margin-bottom:14px">${tabBtn('comisiones','💼 Comisiones')}${tabBtn('referidos','🏷️ Referidos')}</div>`;

  if(activeTab==='comisiones'){
    // ── Reutilizar rtComisiones ────────────────────────────────
    const fechas=t.fechas||[];
    const vends=getVendedores();
    const c=t.premiosCfg||{};
    const pct1=c.pct1??50;const pct2=c.pct2??25;const pct3=c.pct3??10;
    if(!vends.length){
      el.innerHTML=tabsHTML+'<p class="sub">No hay vendedores configurados aún. Agregá vendedores desde el menú global.</p>';
      return;
    }
    const filas=vends.map(vend=>{
      const celdas=fechas.map((f,fi)=>{
        const cuota=f.cuota??t.cuotasFecha?.[fi]??t.cuota??500;
        const uids=t.participantes||[];
        let jugadas=0;
        uids.forEach(uid=>{
          const cod=codigoRefParaFi(uid,fi,t);
          if(cod===vend.codigo)jugadas+=nJugadasHabilitadas(fi,uid,t);
        });
        const recaudado=jugadas*cuota;
        const comision=Math.round(recaudado*(vend.pct||0)/100);
        return{jugadas,recaudado,comision,cuota};
      });
      const totalRec=celdas.reduce((s,c)=>s+c.recaudado,0);
      const totalCom=celdas.reduce((s,c)=>s+c.comision,0);
      return{vend,celdas,totalRec,totalCom};

            <div style="font-size:10px;color:var(--c-success)">${'$'+c.comision.toLocaleString()}</div>
            <div style="font-size:9px;color:var(--c-text3)">${c.jugadas}j</div>
          </td>`).join('')}
        <td style="text-align:right;font-weight:600">${'$'+totalRec.toLocaleString()}</td>
        <td style="text-align:right;font-weight:600;color:var(--c-success)">${'$'+totalCom.toLocaleString()}</td>
      </tr>`).join('');
    el.innerHTML=tabsHTML+`
    <div style="display:flex;justify-content:flex-end;margin-bottom:8px">
      <button class="btn btn-sm" onclick="exportarComisionesExcel()">📊 Exportar Excel</button>
    </div>
    <div style="overflow-x:auto">
    <table style="font-size:12px;min-width:max-content;width:100%">
      <thead><tr>
        <th>Vendedor</th><th>Código</th><th>%</th>
        ${headerFechas}
        <th style="text-align:right">Total Rec.</th><th style="text-align:right">Total Comisión</th>
      </tr></thead>
      <tbody>${bodyRows}</tbody>
      <tfoot><tr style="background:var(--c-bg2);border-top:2px solid var(--c-border)">
        <td colspan="3" style="font-weight:700;font-size:13px;padding:8px 4px">Totales</td>
        ${fechas.map((_,fi)=>{
          const total=filas.reduce((s,r)=>s+r.celdas[fi].recaudado,0);
          const totalCom=filas.reduce((s,r)=>s+r.celdas[fi].comision,0);
          return total===0?`<td style="text-align:center;color:var(--c-text3)">—</td>`
            :`<td style="text-align:center;font-weight:600"><div>${'$'+total.toLocaleString()}</div><div style="font-size:10px;color:var(--c-success)">${'$'+totalCom.toLocaleString()}</div></td>`;
        }).join('')}

      </tr></tfoot>

  } else {

    const uids=t.participantes||[];
    const busq=el.dataset.busqRef||'';
    const filas=uids.map(uid=>{
      const p=allParts()[uid]||{};
      const hist=t.codigosRef?.[uid]||[];
      const vigente=hist.find(r=>r.hasta===null||r.hasta===undefined);
      return{uid,p,hist,vigente};
    }).filter(({p,hist})=>{
      if(!busq)return true;
      const q=busq.toLowerCase();
      const vigCod=hist.find(r=>r.hasta===null||r.hasta===undefined)?.codigo||'';
      return (p.nombre+' '+p.apellido+' '+(p.dni||'')+' '+vigCod).toLowerCase().includes(q);

    <table style="width:100%;font-size:12px">
      <thead><tr><th>Participante</th><th>DNI</th><th>Cód. vigente</th><th>Vendedor vigente</th><th style="text-align:center">Entradas</th><th></th></tr></thead>

          <td>${vigente?`<code style="font-size:11px;background:var(--c-bg2);padding:1px 5px;border-radius:3px">${vigente.codigo}</code>`:'<span style="color:var(--c-text3)">Sin código</span>'}</td>
          <td style="color:var(--c-text2)">${vend?vend.nombre+' '+vend.apellido:'—'}</td>
          <td style="text-align:center">${hist.length}</td>

        </tr>`;

    </table></div>`}`;
    const busqEl=el.querySelector('#busq-ref-admin');
    if(busqEl){
      busqEl.addEventListener('input',function(){
        const q=this.value.toLowerCase();
        el.dataset.busqRef=this.value;
        el.querySelectorAll('#tbody-ref-admin tr').forEach(tr=>{
          const txt=(tr.dataset.bref||'').toLowerCase();
          tr.style.display=(!q||txt.includes(q))?'':'none';
        });
      });
    }
  }
}

window.exportarReferidosExcel=function(){
  const t=T();if(!t)return;

  window._loadExcelJS(function(){
    const wb=new ExcelJS.Workbook();wb.creator='Prode Fútbol';

window.abrirConcluirTorneo=function(){
  const t=T();if(!t)return;
  const uids=t.participantes||[];
  // Calcular saldos pendientes
  const pendientes=uids.map(uid=>{
    const {totalJugado,totalPagado}=calcSaldoUid(uid,t);
    const saldo=totalPagado-totalJugado;
    const p=allParts()[uid]||{};
    return{uid,nombre:`${p.nombre||''} ${p.apellido||''}`.trim(),saldo};
  }).filter(x=>x.saldo!==0);

  // Saldos de vendedores pendientes
  const vends=getVendedores();
  const vendPend=vends.map(vend=>{
    const deuda=calcDeudaVendedor(vend.codigo);
    const pagos=(cfg()?.pagosVendedores||[]).filter(p=>p.codigo===vend.codigo);
    const totalPagado=pagos.reduce((s,p)=>s+p.monto,0);
    const saldo=totalPagado-deuda;
    return{codigo:vend.codigo,nombre:`${vend.nombre} ${vend.apellido}`,saldo};
  }).filter(x=>x.saldo!==0);

  const modal=document.getElementById('modal-concluir');
  if(modal)modal.remove();
  const div=document.createElement('div');
  div.id='modal-concluir';
  div.style.cssText='display:block;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;overflow-y:auto';
  div.innerHTML=`<div style="background:var(--c-bg);border-radius:12px;max-width:520px;margin:6vh auto;padding:24px;box-shadow:0 8px 30px rgba(0,0,0,.3)">
    <h3 style="font-size:16px;font-weight:700;margin:0 0 8px;color:var(--c-danger)">⚠️ Concluir Torneo</h3>
    <p style="font-size:13px;color:var(--c-text2);margin-bottom:14px">
      Al concluir, el torneo quedará en <strong>modo solo lectura</strong>. 
      Ningún dato podrá modificarse. Esta acción no puede deshacerse.
    </p>
    ${pendientes.length?`<div style="background:var(--c-warn-bg);border:1px solid var(--c-warn);border-radius:8px;padding:10px;margin-bottom:12px">
      <p style="font-size:12px;font-weight:600;color:var(--c-warn);margin-bottom:6px">⚠️ ${pendientes.length} participante${pendientes.length!==1?'s':''} con saldo pendiente:</p>
      ${pendientes.map(x=>`<div style="font-size:12px;display:flex;justify-content:space-between;padding:2px 0">
        <span>${x.nombre}</span>
        <span style="font-weight:600;color:${x.saldo>=0?'var(--c-success)':'var(--c-danger)'}">${x.saldo>=0?'+':''}$${x.saldo.toLocaleString()}</span>
      </div>`).join('')}
    </div>`:'<p style="font-size:12px;color:var(--c-success);margin-bottom:12px">✅ Todos los participantes tienen saldo saldado.</p>'}
    ${vendPend.length?`<div style="background:var(--c-bg2);border-radius:8px;padding:10px;margin-bottom:12px">
      <p style="font-size:12px;font-weight:600;margin-bottom:6px">💼 ${vendPend.length} vendedor${vendPend.length!==1?'es':''} con saldo pendiente:</p>
      ${vendPend.map(x=>`<div style="font-size:12px;display:flex;justify-content:space-between;padding:2px 0">
        <span>${x.nombre} (${x.codigo})</span>
        <span style="font-weight:600;color:${x.saldo>=0?'var(--c-success)':'var(--c-danger)'}">${x.saldo>=0?'+':''}$${x.saldo.toLocaleString()}</span>
      </div>`).join('')}
    </div>`:''}
    <p style="font-size:13px;margin-bottom:14px">Escribí <strong>CONCLUIR</strong> para confirmar:</p>
    <input id="concluir-confirm" class="inp" placeholder="CONCLUIR" style="margin-bottom:12px"/>

    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="document.getElementById('modal-concluir').remove()">Cancelar</button>
      <button class="btn btn-danger" onclick="ejecutarConcluirTorneo()">Concluir torneo</button>
    </div>
  </div>`;
  document.body.appendChild(div);
};

window.ejecutarConcluirTorneo=async function(){
  const confirmVal=document.getElementById('concluir-confirm')?.value?.trim();
  if(confirmVal!=='CONCLUIR'){alert('Escribí CONCLUIR para confirmar.');return;}
  const torneosList=JSON.parse(JSON.stringify(torneos()));
  const idx=torneosList.findIndex(t=>t.id===S.torneoActivo);
  if(idx<0)return;
  torneosList[idx].estado='concluido';
  await fupd('config/global',{torneos:torneosList});
  document.getElementById('modal-concluir')?.remove();
  alert('✅ Torneo concluido. Queda en modo solo lectura. Los saldos pendientes deberán cargarse manualmente en la nueva liga.');
  renderShell();
  setTimeout(()=>selectTorneo(S.torneoActivo),400);
};


window.toggleVisibilidadTorneo=async function(){
  const ts=JSON.parse(JSON.stringify(torneos()));
  const idx=ts.findIndex(t=>t.id===S.torneoActivo);
  if(idx<0)return;
  const actual=ts[idx].visible!==false; // si no está definido, asumimos visible
  ts[idx].visible=!actual;
  await fupd('config/global',{torneos:ts});
  const msg=ts[idx].visible?'✅ Torneo publicado — los participantes ya pueden verlo.':'🔒 Torneo oculto — solo visible para el admin.';
  // No usar alert para no interrumpir el flujo
  renderShell();setTimeout(()=>selectTorneo(S.torneoActivo),100);
};

window.guardarResultadosFecha=async function(fi){
  const t=T();if(!t)return;
  const f=(t.fechas||[])[fi];if(!f)return;
  const partidos=f.partidos||[];
  const resultados=t.resultados||{};
  const faltantes=partidos.filter((_,pi)=>!resultados[`${fi}-${pi}-signo`]);
  // Si está En Ejecución, preguntar si pasar a Terminada
  if(f.estado==='en ejecucion'){
    if(faltantes.length>0){
      alert(`Faltan ${faltantes.length} resultado${faltantes.length>1?'s':''} por cargar antes de poder terminar la fecha.`);return;
    }
    const pasar=confirm(`Todos los resultados de "${f.nombre}" están cargados.\n\n¿Marcar la fecha como Terminada?`);
    if(pasar){
      const fechas=JSON.parse(JSON.stringify(t.fechas||[]));
      fechas[fi].estado='terminada';
      await fupd(`torneos/${S.torneoActivo}`,{fechas});
    }
  }
  const el=document.getElementById('res-msg-'+fi);

// Saldo disponible del participante para una fecha específica


// ── FUENTE ÚNICA DE VERDAD: saldo de un participante ─────────
function calcSaldoUid(uid, t){
  const fechas=t.fechas||[];
  const c=t.premiosCfg||{};
  const movs=t.pagosDetalle?.[uid]||[];
  const totalPagado=movs.reduce((s,m)=>s+m.monto,0);

  // Fechas relevantes: hasta la activa (inclusive) o la última terminada
  const fiActiva=fechas.findIndex(f=>f.estado==='activa');
  const hasta=fiActiva>=0
    ?fiActiva
    :fechas.reduce((last,f,i)=>f.estado==='terminada'?i:last,-1);

  // Distribuir pagos en orden por fecha
  let restante=totalPagado;
  const cobertura={};
  let totalDebe=0;
  let totalJugado=0;

  fechas.forEach((f,fi)=>{
    if(fi>hasta){cobertura[fi]='futuro';return;}
    const fDat=(t.fechas||[])[fi];
    const cf=fDat?.cuota??t.cuotasFecha?.[fi]??t.cuota??500;
    // Contar jugadas habilitadas de este uid en esta fecha
    const nJHab=nJugadasHabilitadas(fi,uid,t);
    if(nJHab===0){cobertura[fi]='ausente';return;}
    const cfTotal=cf*nJHab;
    totalDebe+=cfTotal;
    totalJugado+=cfTotal;
    const cubre=Math.min(restante,cfTotal);
    cobertura[fi]=cubre;
    restante=Math.max(0,restante-cfTotal);
  });

  const saldo=totalPagado-totalDebe; // positivo = a favor, negativo = debe

  // Total ganado desde calcPozos
  const pozos=calcPozos(t,c);
  let totalGanado=0;
  pozos.forEach(r=>{
    if(!r.calculado)return;
    // gan contiene keys "uid#jIdx" - contar todas las jugadas ganadoras del uid
    const nJT=t.jugadas?.[`${r.fi}-${uid}`]||1;
    for(let j=0;j<nJT;j++){
      const key=`${uid}#${j}`;
      if(r.gan1.includes(key))totalGanado+=r.mPorGan1;
      else if(r.gan2.includes(key))totalGanado+=r.mPorGan2;
      else if(r.gan3.includes(key))totalGanado+=r.mPorGan3;
    }
  });

  // Saldo disponible para una fecha específica (cuánto le queda después de pagar las anteriores)
  function saldoParaFecha(fi){
    let deudaAnterior=0;
    for(let i=0;i<fi;i++){
      const fDat2=(t.fechas||[])[i];
      const cf2=fDat2?.cuota??t.cuotasFecha?.[i]??t.cuota??500;
      deudaAnterior+=cf2*nJugadasHabilitadas(i,uid,t);
    }
    const disponible=totalPagado-deudaAnterior;
    const fDat=t.fechas?.[fi];
    const cuotaFi=fDat?.cuota??t.cuotasFecha?.[fi]??t.cuota??500;
    return{disponible,cuotaFi,alcanza:disponible>=cuotaFi};
  }

  return{
    cobertura,       // por fecha: monto cubierto, 'ausente', 'futuro'
    totalPagado,     // suma de todos los movimientos
    totalDebe,       // suma de cuotas hasta fecha activa (donde juega)
    totalJugado,     // igual que totalDebe (alias semántico)
    totalGanado,     // premios cobrados
    saldo,           // totalPagado - totalDebe (+ = a favor, - = debe)
    debe:Math.max(0,-saldo), // siempre positivo o 0
    saldoParaFecha,  // función: fi → {disponible, cuotaFi, alcanza}
  };
}

// Alias para compatibilidad con código existente
function distribuirPagos(uid,t){return calcSaldoUid(uid,t);}
function calcTotalesParticipante(uid,t){return calcSaldoUid(uid,t);}
function saldoDisponibleParaFecha(uid,fi,t){
  const {saldoParaFecha}=calcSaldoUid(uid,t);
  return saldoParaFecha(fi);
}

  if(uid!==S.uid)return;
  if(jugadaCerrada(fi,uid,jIdx,T()))return alert('Esta jugada ya está cerrada.');
  const f=(T()?.fechas||[])[fi];
  if(f?.estado!=='activa')return alert('Solo podés pronosticar cuando la fecha está Activa.');
  const aus=T()?.ausencias||{};
  const kJ=`${fi}-${uid}-${jIdx}`;const kG=`${fi}-${uid}`;
  let hab; if(kJ in aus)hab=aus[kJ]===false; else if(kG in aus)hab=aus[kG]===false; else hab=false;
  if(!hab)return alert('Esta jugada no está habilitada.');
  const k=`${fi}-${pi}-${uid}-${jIdx}-signo`;
  const prev=pronBuffer[k];
  pronBuffer[k]=prev===signo?'':signo;
  const newVal=pronBuffer[k];
  ['1','X','2'].forEach(s=>{
    document.querySelectorAll(`button[onclick*="bufSJ(${fi},${pi},'${uid}',${jIdx},'${s}')"]`).forEach(btn=>{
      btn.classList.remove('sel-1','sel-X','sel-2');
      if(newVal===s)btn.classList.add('sel-'+s);
    });

  const smsgEl=document.getElementById(`smsg-${uid.slice(-6)}-${jIdx}`);
  if(smsgEl&&!smsgEl.dataset.guardado){smsgEl.textContent='⚠️ Sin guardar';smsgEl.style.color='var(--c-warn)';}

};
window.bufEJ=function(fi,pi,uid,jIdx,campo,val){
  if(S.rol==='admin')return;
  if(uid!==S.uid)return;
  if(jugadaCerrada(fi,uid,jIdx,T()))return;
  const f=(T()?.fechas||[])[fi];
  if(f?.estado!=='activa')return;
  const key=`${fi}-${pi}-${uid}-${jIdx}`;
  if(!pronBuffer[key])pronBuffer[key]={gl:'',gv:''};
  pronBuffer[key][campo]=val;
  const p=pronBuffer[key];
  if(p.gl!==''&&p.gv!==''){
    const l=parseInt(p.gl),vv=parseInt(p.gv);
    pronBuffer[`${fi}-${pi}-${uid}-${jIdx}-signo`]=l>vv?'1':l===vv?'X':'2';
  }
};

window.guardarPronJ=async function(fi,uid,jIdx){
  const t=T();if(!t)return;
  if(!confirm(`⚠️ Jugada ${jIdx+1}: una vez guardada no podés modificarla.\n¿Confirmar?`))return;
  const prons=JSON.parse(JSON.stringify(t.pronosticos||{}));
  // Guardar claves de este fi/uid/jIdx del buffer
  Object.entries(pronBuffer).forEach(([k,val])=>{
    if(k.startsWith(`${fi}-`)&&k.includes(`-${uid}-${jIdx}`))prons[k]=val;
  });
  Object.keys(pronBuffer).filter(k=>k.startsWith(`${fi}-`)&&k.includes(`-${uid}-${jIdx}`))
    .forEach(k=>delete pronBuffer[k]);
  const cerrados=JSON.parse(JSON.stringify(t.pronosticosCerrados||{}));
  cerrados[`${fi}-${uid}-${jIdx}`]=true;
  // Registro de auditoría
  const ua=navigator.userAgent;
  const isMobile=/Mobi|Android|iPhone|iPad/i.test(ua);
  const registros=JSON.parse(JSON.stringify(t.registrosPron||{}));
  registros[`${fi}-${uid}-${jIdx}`]={ts:new Date().toISOString(),dispositivo:isMobile?'Mobile':'PC',ua:ua.substring(0,200)};

  if(el){el.dataset.guardado='1';el.textContent='✅ Guardada';el.style.color='var(--c-success)';setTimeout(()=>{if(el){el.textContent='';delete el.dataset.guardado;}},3000);}
};

window.agregarJugada=async function(fi,uid){
  const t=T();if(!t)return;

  if(f?.estado!=='activa'){alert('Solo se pueden agregar jugadas cuando la fecha está Activa.');return;}
  const actual=t.jugadas?.[`${fi}-${uid}`]||1;
  const jugadas=JSON.parse(JSON.stringify(t.jugadas||{}));
  const aus=JSON.parse(JSON.stringify(t.ausencias||{}));
  jugadas[`${fi}-${uid}`]=actual+1;
  // Deshabilitar EXPLÍCITAMENTE la nueva jugada (puede existir clave previa con false)

  await fupd(`torneos/${S.torneoActivo}`,{jugadas,ausencias:aus});
};
window.quitarJugada=async function(fi,uid){
  const t=T();if(!t)return;
  const actual=t.jugadas?.[`${fi}-${uid}`]||1;
  if(actual<=1)return;
  const jIdx=actual-1;
  // No permitir quitar si tiene pronóstico cerrado
  if(jugadaCerrada(fi,uid,jIdx,t))return alert('Esta jugada ya tiene pronóstico cerrado y no puede eliminarse.');
  if(!confirm(`¿Quitar la Jugada ${jIdx+1}?`))return;
  const jugadas=JSON.parse(JSON.stringify(t.jugadas||{}));
  jugadas[`${fi}-${uid}`]=actual-1;
  await fupd(`torneos/${S.torneoActivo}`,{jugadas});
};

window.toggleAus=async function(fi,uid){
  console.log('toggleAus llamado fi='+fi+' uid='+uid);

  const f=(t.fechas||[])[fi];

  // Leer estado actual directamente de t.ausencias

    el.style.display=!busq||txt.includes(busq)?'':'none';

}
window.setPagosVista=function(vista){

};

window.toggleMovParticipante=function(uid,el){
  const card=el.closest('.pago-row');
  if(!card)return;
  const body=card.querySelector('.mov-body');
  const arrow=card.querySelector('.mov-arrow');
  if(!body)return;
  const abierto=body.style.display!=='none';
  body.style.display=abierto?'none':'block';
  if(arrow)arrow.textContent=abierto?'▼':'▲';

window.el_dataset_set=function(key,val){

};
window.filtrarCronPagos=function(key,val){
  const el=document.getElementById('tab-content');if(!el)return;
  el.dataset[key]=val;
  // Filtrar filas directamente en el DOM sin re-render
  const busq=(el.dataset.busqCron||'').toLowerCase();
  const desde=el.dataset.filtFechaD||'';
  const hasta=el.dataset.filtFechaH||'';
  const montoMin=parseFloat(el.dataset.filtMonto)||0;
  document.querySelectorAll('#tabla-cron-pagos tbody tr').forEach(tr=>{
    const cols=tr.querySelectorAll('td');
    if(!cols.length)return;
    const fecha=cols[0]?.textContent||'';
    const monto=parseFloat((cols[1]?.textContent||'0').replace(/[$,.]/g,''))||0;
    const part=(cols[3]?.textContent||'').toLowerCase();
    const mail=(cols[4]?.textContent||'').toLowerCase();
    const ok=(
      (!busq||(part+' '+mail).includes(busq))&&
      (!desde||fecha>=desde)&&
      (!hasta||fecha<=hasta)&&
      (!montoMin||monto>=montoMin)
    );
    tr.style.display=ok?'':'none';
  });
};

window.cerrarModal=function(){

window.guardarMov=async function(uid,miIdx){
  const sfx=(miIdx!==undefined)?String(miIdx):'new';
  const monto=parseFloat(document.getElementById('mm-monto-'+sfx)?.value)||0;
  const fecha=document.getElementById('mm-fecha-'+sfx)?.value||'';
  const forma=document.getElementById('mm-forma-'+sfx)?.value||'Efectivo';
  const nota=(document.getElementById('mm-nota-'+sfx)?.value||'').trim();
  if(!monto){alert('Ingresá un monto válido.');return;}
  const t=T();if(!t)return;
  const det=JSON.parse(JSON.stringify(t.pagosDetalle||{}));
  if(!det[uid])det[uid]=[];
  if(miIdx!==undefined){det[uid][miIdx]={monto,fecha,forma,nota};}
  else{det[uid].push({monto,fecha,forma,nota});}
  det[uid].sort((a,b)=>(a.fecha||'')>(b.fecha||'')?1:-1);
  await fupd(`torneos/${S.torneoActivo}`,{pagosDetalle:det});
  movExpandidos.add(uid);
  const modal=document.getElementById('modal-pago');if(modal)modal.style.display='none';
  if(typeof cerrarModal==='function')cerrarModal();
  // No cambiar vista - renderTab('pagos') disparado por Firestore mantiene la vista actual
};;

window.guardarPremios=async function(){
  if(document.getElementById('pm-p1')?.disabled){return;}
  const pct1=parseFloat(document.getElementById('pm-p1')?.value)||50;
  const pct2=parseFloat(document.getElementById('pm-p2')?.value)||25;
  const pct3=parseFloat(document.getElementById('pm-p3')?.value)||10;
  const pctRetiro=parseFloat(document.getElementById('pm-ret')?.value)||15;
  const pozoInicial=parseFloat(document.getElementById('pm-pi')?.value)||0;
  if((pct1+pct2+pct3)>100){
    const msg=document.getElementById('pm-msg');
    if(msg){msg.textContent='⚠️ La suma de premios no puede superar 100%.';msg.style.color='var(--c-danger)';}
    return;
  }
  const err1=parseInt(document.getElementById('pm-e1')?.value??'0')||0;
  const err2=parseInt(document.getElementById('pm-e2')?.value??'1')||1;
  const err3=parseInt(document.getElementById('pm-e3')?.value??'2')||2;
  await fupd(`torneos/${S.torneoActivo}`,{premiosCfg:{pct1,pct2,pct3,pctRetiro,pozoInicial,err1,err2,err3}});
  const msg=document.getElementById('pm-msg');
  if(msg){msg.textContent='✅ Guardado';msg.style.color='var(--c-success)';setTimeout(()=>{if(msg)msg.textContent='';},2000);}
};

window.guardarPozoManual=async function(fi,val){
  const t=T();if(!t)return;
  const v=parseFloat(val)||0;
  const fechas=t.fechas||[];
  const updates={};
  updates[`premiosCfg.pozosManual.${fi}`]=v;
  for(let i=parseInt(fi)+1;i<fechas.length;i++){
    const est=fechas[i]?.estado;
    if(!est||est==='planificada'){
      updates[`premiosCfg.pozosManual.${i}`]=deleteField();
    }
  }
  // Quitar foco antes del re-render para que el check de activeElement no lo bloquee
  if(document.activeElement)document.activeElement.blur();
  await fupd(`torneos/${S.torneoActivo}`,updates);
};

  const t2=T();const cfg2=t2?.premiosCfg||{};

  const ac1=nP-(cfg2.err1??0); const ac2=nP-(cfg2.err2??1); const ac3=nP-(cfg2.err3??2);
  const lineas=[
    `📊 Resultados ${r.nombre}`,
    `Pozo total: $${r.pozoTotal.toLocaleString()}`,
    ``,
    `🥇 1° Premio — ${ac1}/${nP} aciertos — $${r.montoP1.toLocaleString()}: ${r.gan1.length?r.gan1.length+' ganador'+(r.gan1.length>1?'es':'')+' → $'+r.mPorGan1.toLocaleString()+' c/u':'VACANTE'}`,
    `🥈 2° Premio — ${ac2}/${nP} aciertos — $${r.montoP2.toLocaleString()}: ${r.gan2.length?r.gan2.length+' ganador'+(r.gan2.length>1?'es':'')+' → $'+r.mPorGan2.toLocaleString()+' c/u':'VACANTE'}`,

window.publicarResultados=async function(){
  const fi=parseInt(document.getElementById('pub-fecha')?.value||'-1');

  const texto=document.getElementById('pub-texto')?.value.trim()||'';

  if(!confirm('¿Publicar los resultados de esta fecha? Los participantes podrán verlos inmediatamente.'))return;

  const notifResult=document.getElementById('chk-notif-resultado')?.checked||false;

  await fupd(`torneos/${S.torneoActivo}`,{resultadosPublicados:pub});

};

          <div style="font-size:11px;color:${(totalPagado-totalJugado)>=0?'var(--c-success)':'var(--c-danger)'}">Saldo</div>
          <div style="font-size:18px;font-weight:600;color:${(totalPagado-totalJugado)>=0?'var(--c-success)':'var(--c-danger)'};margin-top:4px">${(totalPagado-totalJugado)>=0?'+':''}$${(totalPagado-totalJugado).toLocaleString()}</div>
        </div>
      </div>
      ${movs.length?`<p style="font-size:12px;font-weight:500;margin-bottom:6px">Historial de pagos</p>
      <table style="width:100%;font-size:12px"><thead><tr><th>Fecha</th><th>Monto</th><th>Forma</th><th>Nota</th></tr></thead>
