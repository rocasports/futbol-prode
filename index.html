// 🔧 REEMPLAZÁ CON TU CONFIGURACIÓN DE FIREBASE
// ─────────────────────────────────────────────────────────────

    messagingSenderId: "993506133499",
    appId: "1:993506133499:web:d633a047b97a888568375e",
    measurementId: "G-7R74H757MB"
  };

const app  = initializeApp(firebaseConfig);
const db   = getFirestore(app);
const auth = getAuth(app);

// ── Estado global ────────────────────────────────────────────
let S = {
  uid: null, rol: null, perfil: null,
  torneoActivo: null,
  data: { config: {}, torneos: {} }
};
let unsubs = [];

// ── Firestore helpers ────────────────────────────────────────
function dref(path) {
  const p = path.split('/');
  let r = null;
  p.forEach((s,i) => r = i%2===0 ? (r?collection(r,s):collection(db,s)) : doc(r,s));
  return r;
}
async function fget(path) { const s=await getDoc(dref(path)); return s.exists()?s.data():null; }
async function fset(path,data) { await setDoc(dref(path),data,{merge:true}); }
async function fupd(path,data) { try{await updateDoc(dref(path),data);}catch(e){await setDoc(dref(path),data,{merge:true});} }
function flisten(path,cb) { const u=onSnapshot(dref(path),s=>cb(s.exists()?s.data():null)); unsubs.push(u); return u; }
function stopAll() { unsubs.forEach(u=>u()); unsubs=[]; }

// ── Accesores ────────────────────────────────────────────────
function cfg()      { return S.data.config; }
function admins()   { return cfg().admins||[]; }
function allParts() { return cfg().participantes||{}; }
function torneos()  { return cfg().torneos||[]; }
function T()        { return S.torneoActivo?S.data.torneos[S.torneoActivo]:null; }
function partsT()   { return T()?.participantes||[]; }
function ausente(fi,uid) { return !!(T()?.ausencias?.[`${fi}-${uid}`]); }
function meta()     { return torneos().find(x=>x.id===S.torneoActivo)||{}; }
function nombrePart(uid) {
  const p=allParts()[uid];
  return p?`${p.nombre} ${p.apellido}`:uid;
}

// ─────────────────────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  // Magic link callback
  if (isSignInWithEmailLink(auth, window.location.href)) {
    let email = localStorage.getItem('emailForSignIn');
    if (!email) email = prompt('Confirmá tu email:');
    signInWithEmailLink(auth, email, window.location.href)
      .then(()=>{ localStorage.removeItem('emailForSignIn'); history.replaceState(null,'',APP_URL); })
      .catch(e=>setApp(`<div class="login-wrap"><div class="login-card"><p style="color:var(--c-danger)">Error: ${e.message}</p><button class="btn btn-primary" onclick="location.href='${APP_URL}'">Volver</button></div></div>`));
    return;
  }

  setApp(loadingHTML());

  onAuthStateChanged(auth, async user => {
    stopAll();
    if (!user) { S={uid:null,rol:null,perfil:null,torneoActivo:null,data:{config:{},torneos:{}}}; renderLogin(); return; }
    S.uid = user.uid;
    await handleUserLogin(user);
  });
});

async function handleUserLogin(user) {
  setApp(loadingHTML('Verificando acceso...'));

  // Cargar o inicializar config global
  let cfgData = await fget('config/global');
  if (!cfgData) {
    cfgData = { admins:[], participantes:{}, torneos:[] };
    await fset('config/global', cfgData);
  }
  S.data.config = cfgData;

  const email = user.email;
  const parts = cfgData.participantes||{};
  const isAdmin = (cfgData.admins||[]).includes(user.uid);

  // Buscar participante pendiente de login (cargado por admin con ese mail)
  const pendingLogin = Object.entries(parts).find(([,p])=>p.estado==='pendiente_login'&&p.mail===email);

  if (pendingLogin) {
    // Vincular: mover de tempId a uid real
    const [tempId, perfil] = pendingLogin;
    const newParts = {...parts};
    delete newParts[tempId];
    newParts[user.uid] = {...perfil, uid:user.uid, estado:'activo'};
    // Migrar en torneos
    const ts = cfgData.torneos||[];
    for (const t of ts) {
      const td = await fget(`torneos/${t.id}`);
      if (td && (td.participantes||[]).includes(tempId)) {
        await fupd(`torneos/${t.id}`, {participantes: td.participantes.map(u=>u===tempId?user.uid:u)});
      }
    }
    await fset('config/global', {participantes: newParts});
    S.data.config.participantes = newParts;
  }

  // Re-leer participante
  const myPart = S.data.config.participantes[user.uid];
  S.perfil = myPart || null;
  S.rol = isAdmin ? 'admin' : 'participante';

  if (isAdmin) {
    // Admin entra directo
    await startApp();
    return;
  }

  if (!myPart) {
    // Desconocido — auto-registro
    renderAutoRegistro(user);
    return;
  }

  if (myPart.estado === 'pendiente_aprobacion') {
    renderEsperaAprobacion(myPart);
    return;
  }

  if (myPart.estado === 'rechazado') {
    renderRechazado();
    return;
  }

  if (myPart.estado === 'activo') {
    await startApp();
    return;
  }

  // Fallback
  renderEsperaAprobacion(myPart);
}

async function startApp() {
  renderShell();
  flisten('config/global', data => {
    S.data.config = data||{admins:[],participantes:{},torneos:[]};
    S.perfil = (data?.participantes||{})[S.uid]||null;
    renderTorneosNav();
    suscribirTorneos();
    if (S.torneoActivo) refreshTorneoView();
    // Si admin ve pendientes, refrescar badge
    actualizarBadgePendientes();
  });
}

function suscribirTorneos() {
  torneos().forEach(t => {
    if (!S.data.torneos[t.id]) {
      S.data.torneos[t.id] = {};
      flisten(`torneos/${t.id}`, data => {
        S.data.torneos[t.id] = data||{};
        if (S.torneoActivo===t.id) refreshTorneoView();
      });
    }
  });
}

// PANTALLAS PRE-APP

    <div class="login-wrap">

        <h1 class="login-title" style="font-size:18px">Acceso denegado</h1>

// ─────────────────────────────────────────────────────────────
// ACCIONES AUTH
// ─────────────────────────────────────────────────────────────
window.loginGoogle = async function() {
  try { await signInWithPopup(auth, new GoogleAuthProvider()); }
  catch(e) { msg('login-msg', e.code==='auth/popup-closed-by-user'?'':'Error: '+e.message, true); }
};

window.loginMagicLink = async function() {
  const email = document.getElementById('login-mail').value.trim();
  if (!email) return msg('login-msg','Escribí tu email',true);
  try {
    await sendSignInLinkToEmail(auth, email, {url:APP_URL, handleCodeInApp:true});
    localStorage.setItem('emailForSignIn', email);
    msg('login-msg',`✅ Link enviado a ${email}. Revisá tu correo.`,false);
  } catch(e) { msg('login-msg','Error: '+e.message,true); }
};

window.enviarRegistro = async function() {
  const nombre   = v('r-nombre');
  const apellido = v('r-apellido');
  const dni      = v('r-dni');
  const cel      = v('r-cel');
  const mail     = v('r-mail');
  if (!nombre||!apellido||!dni||!cel||!mail) return msg('reg-msg','Completá todos los campos',true);
  const perfil = { nombre, apellido, dni, cel, mail, uid:S.uid, estado:'pendiente_aprobacion' };
  await fset('config/global', { participantes: { [S.uid]: perfil } });
  msg('reg-msg','✅ Solicitud enviada',false);
  setTimeout(()=>renderEsperaAprobacion(perfil), 1200);
};

window.cerrarSesion = async function() { await signOut(auth); };

// SHELL
// ─────────────────────────────────────────────────────────────
function renderShell() {
  const isAdmin = S.rol==='admin';
  const nombre  = S.perfil?`${S.perfil.nombre} ${S.perfil.apellido}`:(auth.currentUser?.email||'Admin');
  setApp(`
    <div class="layout">
      <div class="sidebar">
        <div class="sidebar-header">
          <span class="sidebar-logo">⚽</span>
          <div style="flex:1;min-width:0">
            <div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nombre}</div>
            <div style="font-size:11px;color:var(--c-text2)">${isAdmin?'Administrador':'Participante'}</div>
          </div>
          <button class="btn btn-sm" onclick="cerrarSesion()" title="Salir" style="padding:4px 8px">↩</button>
        </div>
        ${isAdmin?`
        <div class="sidebar-section">Global</div>
        <div class="nav-item" id="nav-participantes" onclick="navTo('participantes')">👥 Participantes <span id="badge-pendientes" style="display:none;background:var(--c-danger);color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:auto"></span></div>
        <div class="nav-item" id="nav-admins" onclick="navTo('admins')">🔑 Admins</div>`:`
        <div class="sidebar-section">Mi cuenta</div>
        <div class="nav-item" id="nav-miperfil" onclick="navTo('miperfil')">👤 Mis datos</div>`}
        <div class="sidebar-section">Torneos</div>
        <div id="torneos-nav"></div>
        ${isAdmin?`<div class="nav-add" onclick="navTo('nuevo-torneo')">+ Nuevo torneo</div>`:''}
      </div>
      <div class="content" id="content">
        <div class="empty-state">Seleccioná un torneo del menú</div>
      </div>
    </div>`);
  renderTorneosNav();
  actualizarBadgePendientes();
}

function actualizarBadgePendientes() {
  if (S.rol!=='admin') return;
  const el = document.getElementById('badge-pendientes');
  if (!el) return;
  const n = Object.values(allParts()).filter(p=>p.estado==='pendiente_aprobacion').length;
  if (n>0) { el.textContent=n; el.style.display=''; }
  else el.style.display='none';
}

function renderTorneosNav() {
  const nav = document.getElementById('torneos-nav');
  if (!nav) return;
  const ts = torneos();
  if (!ts.length) { nav.innerHTML='<div style="font-size:12px;color:var(--c-text3);padding:6px 10px">Sin torneos</div>'; return; }
  const visible = S.rol==='admin' ? ts : ts.filter(t=>{
    const td=S.data.torneos[t.id];
    return td&&(td.participantes||[]).includes(S.uid);
  });
  nav.innerHTML = visible.map(t=>`
    <div class="nav-item ${S.torneoActivo===t.id?'active':''}" onclick="selectTorneo('${t.id}')">
      <span>${t.nombre}</span>
      <span class="t-badge">${t.sistema==='1x2'?'1X2':'Exacto'}</span>
    </div>`).join('');
}

window.selectTorneo = function(id) {
  S.torneoActivo=id; renderTorneosNav(); refreshTorneoView();
};

window.navTo = function(dest) {
  S.torneoActivo=null; renderTorneosNav();
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+dest); if(el)el.classList.add('active');
  const c=document.getElementById('content');
  if(dest==='participantes') renderViewParticipantes(c);
  else if(dest==='admins')   renderViewAdmins(c);
  else if(dest==='miperfil') renderViewMiPerfil(c);
  else if(dest==='nuevo-torneo') renderViewNuevoTorneo(c);
};

// ─────────────────────────────────────────────────────────────
// VISTA TORNEO
// ─────────────────────────────────────────────────────────────
function refreshTorneoView() {
  const content=document.getElementById('content');
  if(!content||!S.torneoActivo) return;
  const t=T();
  if(!t){content.innerHTML='<div class="empty-state">Cargando...</div>';return;}
  const isAdmin=S.rol==='admin';
  const tabs=isAdmin
    ?['participantes-t','equipos','fechas','resultados','pronosticos','pagos','premios','posiciones']
    :['pronosticos','posiciones'];
  const labels={'participantes-t':'Participantes','equipos':'Equipos','fechas':'Fechas',
    'resultados':'Resultados','pronosticos':'Pronósticos','pagos':'Pagos','premios':'Premios','posiciones':'Posiciones'};
  const curTab=content.dataset.activeTab;
  const defTab=isAdmin?'participantes-t':'pronosticos';
  const activeTab=tabs.includes(curTab)?curTab:defTab;
  const m=meta();
  content.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div>
        <span style="font-size:14px;font-weight:500">${m.nombre||''}</span>
        <span class="sistema-badge">${m.sistema==='1x2'?'1X2':'Resultado exacto'}</span>
      </div>
      ${isAdmin?`<button class="btn btn-sm btn-danger" onclick="eliminarTorneo()">Eliminar</button>`:''}
    </div>
    <div class="tabs">${tabs.map(id=>`<div class="tab ${id===activeTab?'active':''}" onclick="switchTab('${id}',this)">${labels[id]}</div>`).join('')}</div>
    <div id="tab-content"></div>`;
  content.dataset.activeTab=activeTab;
  renderTab(activeTab);
}

window.switchTab=function(id,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('content').dataset.activeTab=id;
  renderTab(id);
};

function renderTab(id) {
  const el=document.getElementById('tab-content'); if(!el)return;
  ({'participantes-t':renderTabParticipantes,'equipos':renderTabEquipos,'fechas':renderTabFechas,
    'resultados':renderTabResultados,'pronosticos':renderTabPronosticos,
    'pagos':renderTabPagos,'premios':renderTabPremios,'posiciones':renderTabPosiciones}[id]||(_=>{}))(el);
}

// ─────────────────────────────────────────────────────────────
// ADMIN — PARTICIPANTES GLOBALES
// ─────────────────────────────────────────────────────────────

  const rechazados  = Object.entries(parts).filter(([,p])=>p.estado==='rechazado');

  content.innerHTML=`
    <p class="section-title">Participantes</p>

    ${pendientes.length?`
    <div class="card" style="border-color:var(--c-warn-border)">
      <p style="font-size:13px;font-weight:500;margin-bottom:8px;color:var(--c-warn)">⏳ Pendientes de aprobación (${pendientes.length})</p>
      ${pendientes.map(([uid,p])=>`
        <div class="part-row">
          <div class="part-info"><strong>${p.nombre} ${p.apellido}</strong><span>${p.mail}</span><span>DNI: ${p.dni} · Cel: ${p.cel}</span></div>
          <div style="display:flex;gap:6px">
            <button class="btn btn-sm btn-primary" onclick="aprobarPart('${uid}')">✓ Aprobar</button>
            <button class="btn btn-sm btn-danger" onclick="rechazarPart('${uid}')">✕ Rechazar</button>
          </div>
        </div>`).join('')}
    </div>`:``}

    <div class="card">
      <p style="font-size:13px;font-weight:500;margin-bottom:8px">Cargar participante manualmente</p>
      <div class="row"><label class="lbl">Nombre:</label><input id="pn" placeholder="Nombre *"/></div>
      <div class="row"><label class="lbl">Apellido:</label><input id="pa" placeholder="Apellido *"/></div>
      <div class="row"><label class="lbl">DNI:</label><input id="pd" placeholder="DNI *"/></div>
      <div class="row"><label class="lbl">Celular:</label><input id="pc" placeholder="Celular *"/></div>
      <div class="row"><label class="lbl">Mail:</label><input id="pm" type="email" placeholder="Mail * (debe coincidir con su login)"/></div>
      <button class="btn btn-primary btn-sm" onclick="addParticipanteManual()">Agregar</button>
      <p id="part-msg" style="font-size:12px;margin-top:6px;min-height:16px"></p>
    </div>

    ${activos.length?`
    <p style="font-size:12px;font-weight:500;color:var(--c-text2);margin-bottom:6px">✅ Activos (${activos.length})</p>
    <div style="overflow-x:auto"><table>
      <thead><tr><th>Nombre</th><th>DNI</th><th>Cel</th><th>Mail</th><th></th></tr></thead>
      <tbody>${activos.map(([uid,p])=>`
        <tr>
          <td style="font-weight:500">${p.nombre} ${p.apellido}</td>
          <td>${p.dni}</td><td>${p.cel}</td><td>${p.mail}</td>
          <td><button class="btn btn-sm btn-danger" onclick="desactivarPart('${uid}')">Desactivar</button></td>
        </tr>`).join('')}
      </tbody>
    </table></div>`:``}

    ${pendLogin.length?`
    <p style="font-size:12px;font-weight:500;color:var(--c-text2);margin:10px 0 6px">📧 Esperando primer login (${pendLogin.length})</p>
    ${pendLogin.map(([uid,p])=>`
      <div class="part-row" style="opacity:.7">
        <div class="part-info"><strong>${p.nombre} ${p.apellido}</strong><span>${p.mail}</span></div>
        <button class="btn btn-sm btn-danger" onclick="eliminarPart('${uid}')">✕</button>
      </div>`).join('')}`:``}

    ${rechazados.length?`
    <p style="font-size:12px;font-weight:500;color:var(--c-text2);margin:10px 0 6px">❌ Rechazados (${rechazados.length})</p>
    ${rechazados.map(([uid,p])=>`
      <div class="part-row" style="opacity:.6">
        <div class="part-info"><strong>${p.nombre} ${p.apellido}</strong><span>${p.mail}</span></div>
        <button class="btn btn-sm btn-primary" onclick="aprobarPart('${uid}')">Reactivar</button>
      </div>`).join('')}`:``}`;

window.addParticipanteManual = async function() {

            <input type="number" min="0" step="100" value="${pago}" style="width:62px;padding:3px 5px;font-size:12px;border:1px solid var(--c-border);border-radius:6px;background:var(--c-bg);color:var(--c-text)" onchange="savePago('${uid}',${fi},this.value)"/>
            ${diff===0?'<span class="badge badge-green">OK</span>':diff>0?`<span class="badge badge-amber">+${diff}</span>`:`<span class="badge badge-red">${diff}</span>`}
          </div></td>`;
        }).join('');
        const saldo=pagado-debe;
        return`<tr><td style="font-weight:500;white-space:nowrap">${nombre}</td>${celdas}
          <td>$${debe.toLocaleString()}</td><td>$${pagado.toLocaleString()}</td>
          <td><span class="badge ${saldo>=0?'badge-green':'badge-red'}">${saldo>=0?'+':''}$${saldo.toLocaleString()}</span></td></tr>`;
      }).join('')}</tbody>
    </table></div>`;
}
window.saveCuota=async function(val){await fupd(`torneos/${S.torneoActivo}`,{cuota:parseFloat(val)||500});};
window.savePago=async function(uid,fi,val){
  const t=T();if(!t)return;
  const pagos=JSON.parse(JSON.stringify(t.pagos||{}));
  pagos[`${uid}-${fi}`]=parseFloat(val)||0;
  await fupd(`torneos/${S.torneoActivo}`,{pagos});
};

  el.innerHTML=`
    <div class="card" style="margin-top:4px">
      <p style="font-size:13px;font-weight:500;margin-bottom:7px">Premio por fecha (pozo acumulado)</p>

      <div class="row"><label class="lbl">2°:</label><input id="pm2" type="number" min="0" value="${c.premio2||0}"/><span style="font-size:12px;color:var(--c-text2)">$</span></div>
      <div class="row"><label class="lbl">3°:</label><input id="pm3" type="number" min="0" value="${c.premio3||0}"/><span style="font-size:12px;color:var(--c-text2)">$</span></div>

window.guardarPremios=async function(){
  const cfg={montoFecha:parseFloat(document.getElementById('pfm').value)||0,condicion:document.getElementById('pcond').value,
    premio1:parseFloat(document.getElementById('pm1').value)||0,premio2:parseFloat(document.getElementById('pm2').value)||0,
    premio3:parseFloat(document.getElementById('pm3').value)||0};
  await fupd(`torneos/${S.torneoActivo}`,{premiosCfg:cfg});
  document.getElementById('premios-resumen').innerHTML=premiosResumenHTML();
};
function premiosResumenHTML(){
  const t=T();if(!t)return'';const m=meta();const c=t.premiosCfg||{};
  const pozos=calcPozos(t,m,c);
  let html=pozos.map(p=>{
    if(p.estado==='pendiente')return`<div class="pozo-row pozo-pendiente"><span>${p.nombre}</span><span style="font-size:11px">Sin resultados — pozo: $${p.pozoDeFecha.toLocaleString()}</span></div>`;
    if(p.estado==='acumulado')return`<div class="pozo-row pozo-acum"><span>${p.nombre} — ACUMULADO</span><span style="font-size:11px">$${p.pozoDeFecha.toLocaleString()} → siguiente</span></div>`;
    const emp=p.ganadores.length>1?` (÷${p.ganadores.length})`:'';
    return`<div class="pozo-row pozo-ganado"><span>${p.nombre} — ${p.ganadores.map(nombrePart).join(' y ')}</span><span style="font-size:11px">$${p.pozoDeFecha.toLocaleString()}${emp} → $${Math.round(p.premioPorGanador).toLocaleString()} c/u</span></div>`;
  }).join('')||'<p class="sub">Sin fechas.</p>';
  const ranking=partsT().map(uid=>({uid,nombre:nombrePart(uid),pts:totalGeneral(uid,t,m)})).sort((a,b)=>b.pts-a.pts);
  if(ranking.length){
    html+='<table style="margin-top:8px"><thead><tr><th>Puesto</th><th>Participante</th><th>Pts</th><th>Premio</th></tr></thead><tbody>';
    ranking.forEach((r,i)=>{const pr=i===0?c.premio1:i===1?c.premio2:i===2?c.premio3:0;html+=`<tr><td>${i+1}°</td><td>${r.nombre}</td><td>${r.pts}</td><td>${pr>0?'$'+(pr||0).toLocaleString():'-'}</td></tr>`;});
    html+='</tbody></table>';
  }
  return html;
}

function renderTabPosiciones(el){
  const t=T();if(!t)return;const m=meta();
  const uids=partsT();const isAdmin=S.rol==='admin';
  const ranking=uids.map(uid=>({uid,nombre:nombrePart(uid),pts:totalGeneral(uid,t,m)})).sort((a,b)=>b.pts-a.pts);
  const cuota=t.cuota||500;
  const totalRec=uids.reduce((s,uid)=>(t.fechas||[]).reduce((ss,_,fi)=>ss+(t.pagos?.[`${uid}-${fi}`]||0),s),0);
  const deudores=uids.filter(uid=>(t.fechas||[]).some((_,fi)=>!ausente(fi,uid)&&(t.pagos?.[`${uid}-${fi}`]||0)<cuota)).length;
  el.innerHTML=`
    <div class="metrics-grid" style="margin-top:4px">
      <div class="metric"><div class="metric-val">${uids.length}</div><div class="metric-lbl">Participantes</div></div>
      <div class="metric"><div class="metric-val">${(t.fechas||[]).length}</div><div class="metric-lbl">Fechas</div></div>
      ${isAdmin?`<div class="metric"><div class="metric-val">$${totalRec.toLocaleString()}</div><div class="metric-lbl">Recaudado</div></div>
      <div class="metric"><div class="metric-val">${deudores}</div><div class="metric-lbl">Con deuda</div></div>`:''}
    </div>
    ${!ranking.length?'<p class="sub">Sin participantes.</p>':`
    <div style="overflow-x:auto"><table>
      <thead><tr><th>#</th><th>Participante</th><th>Total</th>${(t.fechas||[]).map(f=>`<th style="white-space:nowrap">${f.nombre}</th>`).join('')}${isAdmin?'<th>Pagos</th>':''}</tr></thead>
      <tbody>${ranking.map((r,i)=>{
        const pagado=(t.fechas||[]).reduce((s,_,fi)=>s+(t.pagos?.[`${r.uid}-${fi}`]||0),0);
        const debe=(t.fechas||[]).reduce((s,_,fi)=>s+(ausente(fi,r.uid)?0:cuota),0);
        const saldo=pagado-debe;const esMio=r.uid===S.uid;
        return`<tr ${esMio?'style="background:var(--c-info-bg)"':''}>
          <td>${i+1}</td>
          <td style="font-weight:${i<3?'500':'400'};white-space:nowrap">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${r.nombre}${esMio?' ⬅':''}</td>
          <td style="font-weight:500">${r.pts}</td>
          ${(t.fechas||[]).map((_,fi)=>{const tp=totalFecha(fi,r.uid,t,m);const aus=ausente(fi,r.uid);return`<td>${aus?'<span class="badge badge-gray">–</span>':tp!==null?tp:'?'}</td>`;}).join('')}
          ${isAdmin?`<td><span class="badge ${saldo>=0?'badge-green':'badge-red'}">${saldo>=0?'Al día':'Debe $'+Math.abs(saldo).toLocaleString()}</span></td>`:''}
        </tr>`;
      }).join('')}</tbody>
    </table></div>`}`;
}

// ─────────────────────────────────────────────────────────────
// CÁLCULO DE PUNTOS
// ─────────────────────────────────────────────────────────────
function calcPuntos(fi,pi,uid,t,m){
  if(ausente(fi,uid))return null;
  const rs=t.resultados?.[`${fi}-${pi}-signo`]||'';if(!rs)return null;
  if(m.sistema==='1x2'){const ps=t.pronosticos?.[`${fi}-${pi}-${uid}-signo`]||'';if(!ps)return null;return ps===rs?1:0;}
  const pron=t.pronosticos?.[`${fi}-${pi}-${uid}`]||{};const res=t.resultados?.[`${fi}-${pi}`]||{};
  if(pron.gl===undefined||pron.gl==='')return null;if(res.gl===undefined||res.gl==='')return null;
  const ps=t.pronosticos?.[`${fi}-${pi}-${uid}-signo`]||'';
  if(parseInt(pron.gl)===parseInt(res.gl)&&parseInt(pron.gv)===parseInt(res.gv))return 3;
  return ps===rs?1:0;
}
function totalFecha(fi,uid,t,m){
  if(ausente(fi,uid))return null;
  const f=(t.fechas||[])[fi];if(!f)return null;
  let tot=0,hay=false;
  (f.partidos||[]).forEach((_,pi)=>{const pts=calcPuntos(fi,pi,uid,t,m);if(pts!==null){hay=true;tot+=pts;}});
  return hay?tot:null;
}
function totalGeneral(uid,t,m){return(t.fechas||[]).reduce((s,_,fi)=>s+(totalFecha(fi,uid,t,m)||0),0);}
function calcPozos(t,m,c){
  const condicion=c.condicion||'max_puntos';const montoBase=c.montoFecha||0;
  let pozos=[],acumulado=0;
  (t.fechas||[]).forEach((f,fi)=>{
    const pd=montoBase+acumulado;
    const tieneRes=(f.partidos||[]).length>0&&(f.partidos||[]).every((_,pi)=>!!t.resultados?.[`${fi}-${pi}-signo`]);
    if(!tieneRes){pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:[],estado:'pendiente'});return;}
    const activos=partsT().filter(uid=>!ausente(fi,uid));
    const scores=activos.map(uid=>{let pts=0,err=0;(f.partidos||[]).forEach((_,pi)=>{const p=calcPuntos(fi,pi,uid,t,m);if(p!==null){pts+=p;if(p===0)err++;}});return{uid,pts,err};});
    if(!scores.length){pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:[],estado:'acumulado'});acumulado+=montoBase;return;}
    let ganadores=[];
    if(condicion==='max_puntos'){const max=Math.max(...scores.map(s=>s.pts));ganadores=scores.filter(s=>s.pts===max).map(s=>s.uid);}
    else if(condicion==='todos_aciertos'){ganadores=scores.filter(s=>s.err===0).map(s=>s.uid);}
    else{const min=Math.min(...scores.map(s=>s.err));ganadores=scores.filter(s=>s.err===min).map(s=>s.uid);}
    if(!ganadores.length){pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:[],estado:'acumulado'});acumulado+=montoBase;}
    else{pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores,estado:'ganado',premioPorGanador:pd/ganadores.length});acumulado=0;}
  });
  return pozos;
}
