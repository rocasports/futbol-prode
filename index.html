// 🔧 CONFIGURACIÓN FIREBASE
const firebaseConfig = {
  apiKey:            "AIzaSyAiKaY0oqwq1vijs-VzzqSOnZRYkraYZqM",
  authDomain:        "prode-futbol-d1109.firebaseapp.com",
  projectId:         "prode-futbol-d1109",
  storageBucket:     "prode-futbol-d1109.firebasestorage.app",
  messagingSenderId: "993506133499",
  appId:             "1:993506133499:web:d633a047b97a888568375e",

const APP_URL = "https://rocasports.github.io/futbol-prode";

const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const auth=getAuth(app);

let S={uid:null,rol:null,perfil:null,torneoActivo:null,data:{config:{},torneos:{}}};
let unsubs=[];
let pronBuffer={};

function dref(path){const p=path.split('/');let r=null;p.forEach((s,i)=>r=i%2===0?(r?collection(r,s):collection(db,s)):doc(r,s));return r;}
async function fget(path){const s=await getDoc(dref(path));return s.exists()?s.data():null;}
async function fset(path,data){await setDoc(dref(path),data,{merge:true});}
async function fupd(path,data){try{await updateDoc(dref(path),data);}catch(e){await setDoc(dref(path),data,{merge:true});}}
function flisten(path,cb){const u=onSnapshot(dref(path),s=>cb(s.exists()?s.data():null));unsubs.push(u);return u;}
function stopAll(){unsubs.forEach(u=>u());unsubs=[];}

function cfg(){return S.data.config;}
function admins(){return cfg().admins||[];}
function allParts(){return cfg().participantes||{};}
function torneos(){return cfg().torneos||[];}
function T(){return S.torneoActivo?S.data.torneos[S.torneoActivo]:null;}
function partsT(){return T()?.participantes||[];}
function ausente(fi,uid){
  // Default: NO HABILITADO (true). Solo juega si admin marcó aus[k]===false
  const aus=T()?.ausencias||{};
  const k=`${fi}-${uid}`;
  if(!(k in aus))return true;  // no habilitado por defecto
  return aus[k]!==false;
}
function meta(){return torneos().find(x=>x.id===S.torneoActivo)||{};}
function nombrePart(uid){const p=allParts()[uid];return p?`${p.nombre} ${p.apellido}`:uid;}
// Helpers de categoría
const CATEGORIAS = ['A','B','C','D'];
function equipoNombre(e){return typeof e==='string'?e:e.nombre;}
function equipoCategoria(e){return typeof e==='string'?'':e.categoria||'';}
function equipoLabel(e){const c=equipoCategoria(e);return equipoNombre(e)+(c?` [${c}]`:'');}


const ESTADO_COLOR={planificada:'#888',activa:'#16a34a','en ejecucion':'#f59e0b',terminada:'#2563eb',standby:'#d97706'};
const ESTADO_LABEL={planificada:'📅 Planificada',activa:'🟢 Activa','en ejecucion':'⚽ En Ejecución',terminada:'✅ Terminada',standby:'⏸ Stand by'};

window.addEventListener('DOMContentLoaded',()=>{
  if(isSignInWithEmailLink(auth,window.location.href)){
    let email=localStorage.getItem('emailForSignIn');
    if(!email)email=prompt('Confirmá tu email:');
    signInWithEmailLink(auth,email,window.location.href).then(()=>{localStorage.removeItem('emailForSignIn');history.replaceState(null,'',APP_URL);}).catch(e=>setApp(`<div class="lw"><div class="lc"><p style="color:#dc2626">Error: ${e.message}</p></div></div>`));
    return;
  }
  setApp('<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#aaa">Cargando...</div>');
  onAuthStateChanged(auth,async user=>{
    stopAll();
    if(!user){S={uid:null,rol:null,perfil:null,torneoActivo:null,data:{config:{},torneos:{}}};renderLogin();return;}
    S.uid=user.uid;await handleUserLogin(user);
  });
});

async function handleUserLogin(user){
  setApp('<div style="display:flex;align-items:center;justify-content:center;height:100vh;color:#aaa">Verificando...</div>');
  let cfgData=await fget('config/global');
  if(!cfgData){cfgData={admins:[],participantes:{},torneos:[]};await fset('config/global',cfgData);}
  S.data.config=cfgData;
  const parts=cfgData.participantes||{};
  const isAdmin=(cfgData.admins||[]).includes(user.uid);
  const pendingLogin=Object.entries(parts).find(([,p])=>p.estado==='pendiente_login'&&p.mail===user.email);
  if(pendingLogin){
    const[tempId,perfil]=pendingLogin;
    const newParts={...parts};delete newParts[tempId];
    newParts[user.uid]={...perfil,uid:user.uid,estado:'activo'};
    const ts=cfgData.torneos||[];
    for(const t of ts){const td=await fget(`torneos/${t.id}`);if(td&&(td.participantes||[]).includes(tempId))await fupd(`torneos/${t.id}`,{participantes:td.participantes.map(u=>u===tempId?user.uid:u)});}
    await fset('config/global',{participantes:newParts});S.data.config.participantes=newParts;
  }
  const myPart=S.data.config.participantes[user.uid];
  S.perfil=myPart||null;S.rol=isAdmin?'admin':'participante';
  if(isAdmin){await startApp();return;}
  if(!myPart){renderAutoRegistro(user);return;}
  if(myPart.estado==='pendiente_aprobacion'){renderEspera(myPart);return;}
  if(myPart.estado==='rechazado'){renderRechazado();return;}
  await startApp();
}

async function startApp(){
  renderShell();
  flisten('config/global',async data=>{
    S.data.config=data||{admins:[],participantes:{},torneos:[]};
    S.perfil=(data?.participantes||{})[S.uid]||null;
    // FIX 3: si el participante fue aprobado en tiempo real, refrescar sesión
    if(S.rol==='participante'){
      const miPerfil=(data?.participantes||{})[S.uid];
      if(!miPerfil||miPerfil.estado==='pendiente_aprobacion'){
        // Todavía pendiente, mostrar pantalla de espera actualizada
        renderEspera(miPerfil||{nombre:''});return;
      }
      if(miPerfil.estado==='rechazado'){renderRechazado();return;}
    }
    suscribirTorneos();
    renderTorneosNav();
    if(S.torneoActivo)refreshTorneoView();
    badgePend();
    // FIX 1: Si el nav de torneos está vacío porque los datos aún no llegaron, esperar
    if(!S.data.torneos||Object.keys(S.data.torneos).length===0){
      setTimeout(()=>{renderTorneosNav();},800);
    }
  });
}
function suscribirTorneos(){
  torneos().forEach(t=>{
    if(!S.data.torneos[t.id]){
      S.data.torneos[t.id]={};
      flisten(`torneos/${t.id}`,data=>{
        S.data.torneos[t.id]=data||{};
        renderTorneosNav(); // FIX 1: actualizar nav cuando llegan datos del torneo
        if(S.torneoActivo===t.id)refreshTorneoView();
      });
    }
  });
}

function renderLogin(){
  setApp(`<div class="lw"><div class="lc">
    <div class="ll">⚽</div><h1 class="lt">Prode Fútbol</h1><p class="ls">Ingresá para participar</p>
    <p style="font-size:11px;color:var(--c-text3);text-align:center;margin-top:-12px;margin-bottom:12px">v2.5</p>
    <button class="btn-google" onclick="loginGoogle()"><svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>Entrar con Google</button>
    <div class="ld">o con tu mail</div>
    <input id="login-mail" class="li" type="email" placeholder="tu@mail.com"/>
    <button class="btn btn-primary" style="width:100%;margin-top:8px" onclick="loginMagicLink()">Enviar link de acceso</button>
    <p id="login-msg" style="font-size:12px;margin-top:10px;text-align:center;min-height:18px"></p>
  </div></div>`);
}
function renderAutoRegistro(user){
  setApp(`<div class="lw"><div class="lc" style="max-width:420px">
    <div class="ll">📝</div><h1 class="lt" style="font-size:18px">Completá tu registro</h1>
    <p class="ls">Ingresá tus datos. El admin aprobará tu cuenta.</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-top:4px">
      <input id="r-nombre" class="li" placeholder="Nombre *"/>
      <input id="r-apellido" class="li" placeholder="Apellido *"/>
      <input id="r-dni" class="li" placeholder="DNI *"/>
      <input id="r-cel" class="li" placeholder="Celular *"/>
      <input id="r-mail" class="li" type="email" placeholder="Mail *" value="${user.email||''}"/>
    </div>
    <button class="btn btn-primary" style="width:100%;margin-top:12px" onclick="enviarRegistro()">Solicitar acceso</button>
    <p id="reg-msg" style="font-size:12px;margin-top:8px;text-align:center;min-height:18px"></p>
    <button class="btn" style="width:100%;margin-top:8px" onclick="cerrarSesion()">Cancelar</button>
  </div></div>`);

function renderEspera(p){setApp(`<div class="lw"><div class="lc"><div class="ll">⏳</div><h1 class="lt" style="font-size:18px">Registro pendiente</h1><p class="ls">Hola <strong>${p.nombre}</strong>, tu solicitud está siendo revisada.</p><button class="btn" style="width:100%;margin-top:16px" onclick="cerrarSesion()">Salir</button></div></div>`);}
function renderRechazado(){setApp(`<div class="lw"><div class="lc"><div class="ll">❌</div><h1 class="lt" style="font-size:18px">Acceso denegado</h1><p class="ls">Contactá al administrador.</p><button class="btn" style="width:100%;margin-top:16px" onclick="cerrarSesion()">Salir</button></div></div>`);}

window.loginGoogle=async function(){try{await signInWithPopup(auth,new GoogleAuthProvider());}catch(e){if(e.code!=='auth/popup-closed-by-user')emsg('login-msg','Error: '+e.message);}};
window.loginMagicLink=async function(){
  const email=document.getElementById('login-mail').value.trim();
  if(!email)return emsg('login-msg','Escribí tu email');
  try{await sendSignInLinkToEmail(auth,email,{url:APP_URL,handleCodeInApp:true});localStorage.setItem('emailForSignIn',email);smsg('login-msg',`✅ Link enviado a ${email}`);}
  catch(e){emsg('login-msg','Error: '+e.message);}
};
window.enviarRegistro=async function(){
  const nombre=v('r-nombre'),apellido=v('r-apellido'),dni=v('r-dni'),cel=v('r-cel'),mail=v('r-mail');
  if(!nombre||!apellido||!dni||!cel||!mail)return emsg('reg-msg','Completá todos los campos');
  await fset('config/global',{participantes:{[S.uid]:{nombre,apellido,dni,cel,mail,uid:S.uid,estado:'pendiente_aprobacion'}}});
  smsg('reg-msg','✅ Solicitud enviada');setTimeout(()=>renderEspera({nombre}),1200);
};
window.cerrarSesion=async function(){await signOut(auth);};

function renderShell(){
  const isAdmin=S.rol==='admin';
  const nombre=S.perfil?`${S.perfil.nombre} ${S.perfil.apellido}`:(auth.currentUser?.email||'Admin');
  setApp(`<div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span style="font-size:22px">⚽</span>
        <div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${nombre}</div><div style="font-size:11px;color:var(--c-text2)">${isAdmin?'Administrador':'Participante'}</div></div>
        <button class="btn btn-sm" onclick="cerrarSesion()" style="padding:4px 8px">↩</button>
      </div>
      ${isAdmin?`<div class="ss">Global</div>
      <div class="ni" id="nav-participantes" onclick="navTo('participantes')">👥 Participantes <span id="bp" style="display:none;background:#dc2626;color:#fff;border-radius:10px;font-size:10px;padding:1px 6px;margin-left:auto"></span></div>
      <div class="ni" id="nav-admins" onclick="navTo('admins')">🔑 Admins</div>`:`
      <div class="ss">Mi cuenta</div>
      <div class="ni" id="nav-miperfil" onclick="navTo('miperfil')">👤 Mis datos</div>`}
      <div class="ss">Torneos</div>
      <div id="torneos-nav"></div>
      ${isAdmin?`<div class="nav-add" onclick="navTo('nuevo-torneo')">+ Nuevo torneo</div>`:''}
    </div>
    <div class="content" id="content"><div class="empty-state">Seleccioná un torneo</div></div>
  </div>`);
  renderTorneosNav();badgePend();
}
function badgePend(){
  if(S.rol!=='admin')return;
  const el=document.getElementById('bp');if(!el)return;
  const n=Object.values(allParts()).filter(p=>p.estado==='pendiente_aprobacion').length;
  if(n>0){el.textContent=n;el.style.display='';}else el.style.display='none';
}
function renderTorneosNav(){
  const nav=document.getElementById('torneos-nav');if(!nav)return;
  const ts=torneos();if(!ts.length){nav.innerHTML='<div style="font-size:12px;color:#aaa;padding:6px 10px">Sin torneos</div>';return;}
  const visible=S.rol==='admin'?ts:ts.filter(t=>{const td=S.data.torneos[t.id];return td&&(td.participantes||[]).includes(S.uid);});
  nav.innerHTML=visible.map(t=>`<div class="ni ${S.torneoActivo===t.id?'active':''}" onclick="selectTorneo('${t.id}')"><span>${t.nombre}</span><span class="t-badge">${t.sistema==='1x2'?'1X2':'Exacto'}</span></div>`).join('');
}
window.selectTorneo=function(id){S.torneoActivo=id;renderTorneosNav();refreshTorneoView();};
window.navTo=function(dest){
  S.torneoActivo=null;renderTorneosNav();
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('active'));
  const el=document.getElementById('nav-'+dest);if(el)el.classList.add('active');
  const c=document.getElementById('content');
  if(dest==='participantes')renderViewParts(c);
  else if(dest==='admins')renderViewAdmins(c);
  else if(dest==='miperfil')renderViewMiPerfil(c);
  else if(dest==='nuevo-torneo')renderViewNuevoTorneo(c);
};

function refreshTorneoView(){
  const content=document.getElementById('content');if(!content||!S.torneoActivo)return;
  const t=T();if(!t){content.innerHTML='<div class="empty-state">Cargando...</div>';return;}
  const isAdmin=S.rol==='admin';
  const tabs=isAdmin?['participantes-t','equipos','fechas','resultados','pronosticos','pagos','premios','posiciones']:['pronosticos','posiciones'];
  const labels={'participantes-t':'Participantes','equipos':'Equipos','fechas':'Fechas','resultados':'Resultados','pronosticos':'Pronósticos','pagos':'Pagos','premios':'Premios','posiciones':'Posiciones'};
  const curTab=content.dataset.activeTab;
  const activeTab=tabs.includes(curTab)?curTab:(isAdmin?'participantes-t':'pronosticos');
  const m=meta();
  content.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;flex-wrap:wrap;gap:6px">
      <div><span style="font-size:14px;font-weight:500">${m.nombre||''}</span><span class="sistema-badge">${m.sistema==='1x2'?'1X2':'Resultado exacto'}</span></div>
      ${isAdmin?`<button class="btn btn-sm btn-danger" onclick="eliminarTorneo()">Eliminar</button>`:''}
    </div>
    <div class="tabs">${tabs.map(id=>`<div class="tab ${id===activeTab?'active':''}" onclick="switchTab('${id}',this)">${labels[id]}</div>`).join('')}</div>
    <div id="tab-content"></div>`;
  content.dataset.activeTab=activeTab;renderTab(activeTab);
}
window.switchTab=function(id,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');document.getElementById('content').dataset.activeTab=id;renderTab(id);};
function renderTab(id){const el=document.getElementById('tab-content');if(!el)return;({'participantes-t':rtParts,'equipos':rtEquipos,'fechas':rtFechas,'resultados':rtResultados,'pronosticos':rtPronos,'pagos':rtPagos,'premios':rtPremios,'posiciones':rtPos}[id]||(_=>{}))(el);}

// ── PARTICIPANTES GLOBALES ───────────────────────────────────
function renderViewParts(content){
  const parts=allParts();
  const pend=Object.entries(parts).filter(([,p])=>p.estado==='pendiente_aprobacion');
  const pendL=Object.entries(parts).filter(([,p])=>p.estado==='pendiente_login');
  const act=Object.entries(parts).filter(([,p])=>p.estado==='activo');
  const rech=Object.entries(parts).filter(([,p])=>p.estado==='rechazado');
  content.innerHTML=`<p class="section-title">Participantes</p>
    ${pend.length?`<div class="card" style="border-color:var(--c-warn-border)">
      <p style="font-size:13px;font-weight:500;margin-bottom:8px;color:var(--c-warn)">⏳ Pendientes de aprobación (${pend.length})</p>
      ${pend.map(([uid,p])=>`<div class="part-row"><div class="part-info"><strong>${p.nombre} ${p.apellido}</strong><span>${p.mail}</span><span>DNI: ${p.dni} · Cel: ${p.cel}</span></div><div style="display:flex;gap:6px"><button class="btn btn-sm btn-primary" onclick="aprobarP('${uid}')">✓ Aprobar</button><button class="btn btn-sm btn-danger" onclick="rechazarP('${uid}')">✕ Rechazar</button></div></div>`).join('')}
    </div>`:''}
    <div class="card"><p style="font-size:13px;font-weight:500;margin-bottom:8px">Cargar participante manualmente</p>
      <div class="row"><label class="lbl">Nombre:</label><input id="pn" placeholder="Nombre *"/></div>
      <div class="row"><label class="lbl">Apellido:</label><input id="pa" placeholder="Apellido *"/></div>
      <div class="row"><label class="lbl">DNI:</label><input id="pd" placeholder="DNI *"/></div>
      <div class="row"><label class="lbl">Celular:</label><input id="pc" placeholder="Celular *"/></div>
      <div class="row"><label class="lbl">Mail:</label><input id="pm" type="email" placeholder="Mail *"/></div>
      <button class="btn btn-primary btn-sm" onclick="addPartManual()">Agregar</button>
      <p id="part-msg" style="font-size:12px;margin-top:6px;min-height:16px"></p>
    </div>
    ${act.length?`<p style="font-size:12px;font-weight:500;color:var(--c-text2);margin-bottom:6px">✅ Activos (${act.length})</p>
    <div style="overflow-x:auto"><table><thead><tr><th>Nombre</th><th>DNI</th><th>Cel</th><th>Mail</th><th>UID</th><th></th></tr></thead>
    <tbody>${act.map(([uid,p])=>`<tr><td style="font-weight:500">${p.nombre} ${p.apellido}</td><td>${p.dni}</td><td>${p.cel}</td><td>${p.mail}</td><td><code style="font-size:10px;user-select:all">${uid}</code></td><td><button class="btn btn-sm btn-danger" onclick="desactivarP('${uid}')">Desactivar</button></td></tr>`).join('')}</tbody></table></div>`:''}
    ${pendL.length?`<p style="font-size:12px;font-weight:500;color:var(--c-text2);margin:10px 0 6px">📧 Esperando primer login (${pendL.length})</p>${pendL.map(([uid,p])=>`<div class="part-row" style="opacity:.7"><div class="part-info"><strong>${p.nombre} ${p.apellido}</strong><span>${p.mail}</span></div><button class="btn btn-sm btn-danger" onclick="eliminarP('${uid}')">✕</button></div>`).join('')}`:''}
    ${rech.length?`<p style="font-size:12px;font-weight:500;color:var(--c-text2);margin:10px 0 6px">❌ Rechazados (${rech.length})</p>${rech.map(([uid,p])=>`<div class="part-row" style="opacity:.6"><div class="part-info"><strong>${p.nombre} ${p.apellido}</strong><span>${p.mail}</span></div><button class="btn btn-sm btn-primary" onclick="aprobarP('${uid}')">Reactivar</button></div>`).join('')}`:''}`;
}
window.addPartManual=async function(){
  const nombre=v('pn'),apellido=v('pa'),dni=v('pd'),cel=v('pc'),mail=v('pm');
  if(!nombre||!apellido||!dni||!cel||!mail)return emsg('part-msg','Completá todos los campos');
  if(Object.values(allParts()).find(p=>p.mail===mail))return emsg('part-msg','Ya existe con ese mail');
  const tempId='pending_'+mail.replace(/[^a-zA-Z0-9]/g,'_')+'_'+Date.now();
  await fset('config/global',{participantes:{[tempId]:{nombre,apellido,dni,cel,mail,uid:tempId,estado:'pendiente_login'}}});
  smsg('part-msg','✅ Cargado');['pn','pa','pd','pc','pm'].forEach(id=>document.getElementById(id).value='');
};
window.aprobarP=async function(uid){
  const p=JSON.parse(JSON.stringify(allParts()));
  if(p[uid])p[uid].estado='activo';
  await fset('config/global',{participantes:p});
  // FIX 3: forzar re-render inmediato sin esperar el listener
  S.data.config.participantes=p;
  const content=document.getElementById('content');
  if(content&&content.innerHTML.includes('Pendientes de aprobación'))renderViewParts(content);
  // 📧 Enviar email de aprobación
  emailAprobacion(p[uid]);
};
async function emailAprobacion(perfil){
  try{
    await emailjs.send('service_fx6581p','template_hh5r6hr',{
      nombre: perfil.nombre,
      apellido: perfil.apellido,
      mail: perfil.mail,
      app_url: APP_URL,
    });

function libres(fi){const t=T();if(!t)return[];const u=new Set();(t.fechas?.[fi]?.partidos||[]).forEach(p=>{u.add(p.local);u.add(p.visita);});return(t.equipos||[]).filter(e=>!u.has(equipoNombre(e)));}
function usadosEnFecha(fi){const t=T();if(!t)return new Set();const u=new Set();(t.fechas?.[fi]?.partidos||[]).forEach(p=>{u.add(p.local);u.add(p.visita);});return u;}
function optsLocal(fi){
  const t=T();if(!t)return'';
  const usados=usadosEnFecha(fi);
  const disponibles=(t.equipos||[]).filter(e=>!usados.has(equipoNombre(e)));
  // Agrupar por categoría
  const porCat={};
  disponibles.forEach(e=>{const c=equipoCategoria(e)||'Sin cat.';if(!porCat[c])porCat[c]=[];porCat[c].push(e);});
  return Object.entries(porCat).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,eqs])=>
    `<optgroup label="Categoría ${cat}">${eqs.sort((a,b)=>equipoNombre(a).localeCompare(equipoNombre(b),'es')).map(e=>`<option value="${equipoNombre(e)}">${equipoNombre(e)}</option>`).join('')}</optgroup>`
  ).join('');
}
// Valor seleccionado de visita por fecha (mantenemos para compatibilidad con addPartido)
const visitaSeleccionada={};

function optsVisita(fi,localSel){
  const t=T();if(!t)return'';
  const usados=usadosEnFecha(fi);
  const disponibles=(t.equipos||[]).filter(e=>equipoNombre(e)!==localSel&&!usados.has(equipoNombre(e)));
  const porCat={};
  disponibles.forEach(e=>{const c=equipoCategoria(e)||'Sin cat.';if(!porCat[c])porCat[c]=[];porCat[c].push(e);});
  return Object.entries(porCat).sort((a,b)=>a[0].localeCompare(b[0])).map(([cat,eqs])=>
    `<optgroup label="Categoría ${cat}">${eqs.sort((a,b)=>equipoNombre(a).localeCompare(equipoNombre(b),'es')).map(e=>`<option value="${equipoNombre(e)}">${equipoNombre(e)}</option>`).join('')}</optgroup>`
  ).join('');
}
function cruceDup(local,visita,fi){const t=T();if(!t)return null;for(let i=0;i<(t.fechas||[]).length;i++){if(i===fi)continue;const f=t.fechas[i];const e=(f.partidos||[]).find(p=>(p.local===local&&p.visita===visita)||(p.local===visita&&p.visita===local));if(e)return{fi:i,nombre:f.nombre,inv:(e.local===visita)};}return null;}

window.ordenarFechas=async function(dir){

  fechas.sort((a,b)=>{
    const na=a.numero||0,nb=b.numero||0;

  });
  await fupd(`torneos/${S.torneoActivo}`,{fechas});
};

window.addFecha=async function(){

  if(!numero)return emsg('fecha-msg','El número de fecha es obligatorio');

  if(fechas.find(f=>String(f.numero)===String(numero)))return emsg('fecha-msg',`Ya existe la fecha número ${numero}`);
  if(fechas.find(f=>f.nombre.toLowerCase()===nombre.toLowerCase()))return emsg('fecha-msg','Ya existe una fecha con ese nombre');
  await fupd(`torneos/${S.torneoActivo}`,{fechas:[{nombre,numero:parseInt(numero),inicio:inicio||null,partidos:[],estado:'planificada'},...fechas]});
  document.getElementById('f-nombre').value='';document.getElementById('f-num').value='';document.getElementById('f-inicio').value='';
};

window.cambiarEstado=async function(fi,nuevoEstado){
  const t=T();if(!t)return;
  const fechas=JSON.parse(JSON.stringify(t.fechas||[]));
  const f=fechas[fi];
  // FIX 1b: bloquear si Terminada y ya tiene premios asignados
  if(f.estado==='terminada'&&t.premiosPublicados?.[fi]){
    alert(`La fecha "${f.nombre}" ya tiene premios publicados y no puede modificarse.`);
    refreshTorneoView();return;
  }
  if(nuevoEstado==='activa'){
    const otra=fechas.findIndex((f,i)=>i!==fi&&f.estado==='activa');

window.duplicarFechas=async function(){
  const t=T();if(!t)return;
  const fechas=JSON.parse(JSON.stringify(t.fechas||[]));if(!fechas.length)return;
  const maxNum=Math.max(...fechas.map(f=>f.numero||0));
  // Orden inverso: la fecha 1 (primera) se duplica como la última nueva,
  // la última fecha existente se duplica como la primera nueva.
  // Así: si hay F1..F11, la vuelta es F12=inv(F1), F13=inv(F2)...F22=inv(F11)
  // Pero al insertarlas al principio del array, el más reciente queda arriba.
  // Insertamos en orden inverso al principio para que queden F12,F13... de arriba a abajo.
  const nuevas=[...fechas].reverse().map((f,i)=>({
    nombre:`Fecha ${maxNum+fechas.length-i}`,
    numero:maxNum+fechas.length-i,
    inicio:null,
    estado:'planificada',
    partidos:(f.partidos||[]).map(p=>({local:p.visita,visita:p.local}))
  }));
  // nuevas[0] = inv(ultima fecha) con número más alto → irá al principio
  // nuevas[N-1] = inv(primera fecha) con número maxNum+1 → quedará más abajo
  // Pero queremos arriba la de número más alto (más reciente)
  // entonces las insertamos al principio tal cual (ya están en orden desc de número)
  await fupd(`torneos/${S.torneoActivo}`,{fechas:[...nuevas,...fechas]});
};

function cuotaFecha(fi){const t=T();if(!t)return 0;return t.cuotasFecha?.[fi]??t.cuota??500;}

// Índice de la fecha activa
function fechaActivaIdx(){const t=T();if(!t)return -1;return(t.fechas||[]).findIndex(f=>f.estado==='activa');}

// Distribución automática de pagos fecha a fecha (solo fechas que jugó hasta la activa inclusive)
function distribuirPagos(uid,t){
  const fechas=t.fechas||[];
  const fiActiva=fechas.findIndex(f=>f.estado==='activa');
  // Tomar en cuenta solo hasta la fecha activa (inclusive) o terminadas antes
  const hasta=fiActiva>=0?fiActiva:fechas.reduce((last,f,i)=>f.estado==='terminada'?i:last,-1);
  const movs=t.pagosDetalle?.[uid]||[];
  const totalPagado=movs.reduce((s,m)=>s+m.monto,0);
  let restante=totalPagado;
  const cobertura={};
  let totalDebe=0;
  for(let fi=0;fi<fechas.length;fi++){
    if(fi>hasta){cobertura[fi]='futuro';continue;}
    if(ausente(fi,uid)){cobertura[fi]='ausente';continue;}
    const cf=cuotaFecha(fi);
    totalDebe+=cf;
    const cubre=Math.min(restante,cf);
    cobertura[fi]=cubre;
    restante=Math.max(0,restante-cf);
  }
  return{cobertura,totalPagado,totalDebe,saldo:totalPagado-totalDebe};
}

  const t=T();if(!t)return;const m=meta();
  const uids=partsT();const isAdmin=S.rol==='admin';
  const ranking=uids.map(uid=>({uid,nombre:nombrePart(uid),pts:totalG(uid,t,m)})).sort((a,b)=>b.pts-a.pts);
  const cuota=t.cuota||500;
  const totalRec=uids.reduce((s,uid)=>s+(t.pagosDetalle?.[uid]||[]).reduce((ss,m)=>ss+m.monto,0),0);
  const deudores=uids.filter(uid=>{const {saldo}=distribuirPagos(uid,t)||{};const totalPag=(t.pagosDetalle?.[uid]||[]).reduce((s,m)=>s+m.monto,0);const totalDebe=(t.fechas||[]).reduce((s,_,fi)=>s+(ausente(fi,uid)?0:cuotaFecha(fi)),0);return totalPag<totalDebe;}).length;
  el.innerHTML=`<div class="metrics-grid" style="margin-top:4px">
    <div class="metric"><div class="metric-val">${uids.length}</div><div class="metric-lbl">Participantes</div></div>
    <div class="metric"><div class="metric-val">${(t.fechas||[]).length}</div><div class="metric-lbl">Fechas</div></div>
    ${isAdmin?`<div class="metric"><div class="metric-val">$${totalRec.toLocaleString()}</div><div class="metric-lbl">Recaudado</div></div><div class="metric"><div class="metric-val">${deudores}</div><div class="metric-lbl">Con deuda</div></div>`:''}
  </div>
  ${!ranking.length?'<p class="sub">Sin participantes.</p>':`<div style="overflow-x:auto"><table>
    <thead><tr><th>#</th><th>Participante</th><th>Total</th>${(t.fechas||[]).map(f=>`<th style="white-space:nowrap">${f.nombre}</th>`).join('')}${isAdmin?'<th>Pagos</th>':''}</tr></thead>
    <tbody>${ranking.map((r,i)=>{
      const pagado=(t.pagosDetalle?.[r.uid]||[]).reduce((s,m)=>s+m.monto,0);
      const {totalDebe:debe}=distribuirPagos(r.uid,t);
      const saldo=pagado-debe;const esMio=r.uid===S.uid;
      return`<tr ${esMio?'style="background:var(--c-info-bg)"':''}>
        <td>${i+1}</td><td style="font-weight:${i<3?'500':'400'};white-space:nowrap">${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${r.nombre}${esMio?' ⬅':''}</td>
        <td style="font-weight:500">${r.pts}</td>
        ${(t.fechas||[]).map((_,fi)=>{const tp=totalF(fi,r.uid,t,m);const aus=ausente(fi,r.uid);return`<td>${aus?'<span class="badge badge-gray">–</span>':tp!==null?tp:'?'}</td>`;}).join('')}
        ${isAdmin?`<td><span class="badge ${saldo>=0?'badge-green':'badge-red'}">${saldo>=0?'Al día':'Debe $'+Math.abs(saldo).toLocaleString()}</span></td>`:''}
      </tr>`;
    }).join('')}</tbody></table></div>`}`;
}

// ── PUNTOS ───────────────────────────────────────────────────
function calcPuntos(fi,pi,uid,t,m){
  if(ausente(fi,uid))return null;
  const rs=t.resultados?.[`${fi}-${pi}-signo`]||'';if(!rs)return null;
  if(m.sistema==='1x2'){const ps=t.pronosticos?.[`${fi}-${pi}-${uid}-signo`]||'';if(!ps)return null;return ps===rs?1:0;}
  const pron=t.pronosticos?.[`${fi}-${pi}-${uid}`]||{};const res=t.resultados?.[`${fi}-${pi}`]||{};
  if(pron.gl===undefined||pron.gl==='')return null;if(res.gl===undefined||res.gl==='')return null;
  const ps=t.pronosticos?.[`${fi}-${pi}-${uid}-signo`]||'';
  if(parseInt(pron.gl)===parseInt(res.gl)&&parseInt(pron.gv)===parseInt(res.gv))return 3;
  return ps===rs?1:0;
}
function totalF(fi,uid,t,m){if(ausente(fi,uid))return null;const f=(t.fechas||[])[fi];if(!f)return null;let tot=0,hay=false;(f.partidos||[]).forEach((_,pi)=>{const pts=calcPuntos(fi,pi,uid,t,m);if(pts!==null){hay=true;tot+=pts;}});return hay?tot:null;}
function totalG(uid,t,m){return(t.fechas||[]).reduce((s,_,fi)=>s+(totalF(fi,uid,t,m)||0),0);}
function calcPozos(t,m,c){
  const cond=c.condicion||'max_puntos';const mb=c.montoFecha||0;let pozos=[],acum=0;
  (t.fechas||[]).forEach((f,fi)=>{
    const pd=mb+acum;const tieneRes=(f.partidos||[]).length>0&&(f.partidos||[]).every((_,pi)=>!!t.resultados?.[`${fi}-${pi}-signo`]);
    if(!tieneRes){pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:[],estado:'pendiente'});return;}
    const act=partsT().filter(uid=>!ausente(fi,uid));
    const scores=act.map(uid=>{let pts=0,err=0;(f.partidos||[]).forEach((_,pi)=>{const p=calcPuntos(fi,pi,uid,t,m);if(p!==null){pts+=p;if(p===0)err++;}});return{uid,pts,err};});
    if(!scores.length){pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:[],estado:'acumulado'});acum+=mb;return;}
    let gan=[];
    if(cond==='max_puntos'){const max=Math.max(...scores.map(s=>s.pts));gan=scores.filter(s=>s.pts===max).map(s=>s.uid);}
    else if(cond==='todos_aciertos'){gan=scores.filter(s=>s.err===0).map(s=>s.uid);}
    else{const min=Math.min(...scores.map(s=>s.err));gan=scores.filter(s=>s.err===min).map(s=>s.uid);}
    if(!gan.length){pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:[],estado:'acumulado'});acum+=mb;}
    else{pozos.push({nombre:f.nombre,pozoDeFecha:pd,ganadores:gan,estado:'ganado',premioPorGanador:pd/gan.length});acum=0;}
  });
  return pozos;
}

// ── UTILS ────────────────────────────────────────────────────
function v(id){const el=document.getElementById(id);return el?el.value.trim():'';}
function emsg(id,text){const el=document.getElementById(id);if(!el)return;el.textContent=text;el.style.color='var(--c-danger)';}
function smsg(id,text){const el=document.getElementById(id);if(!el)return;el.textContent=text;el.style.color='var(--c-success)';}
function setApp(html){document.getElementById('app').innerHTML=html;}
</script>
