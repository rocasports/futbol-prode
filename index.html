      </tr>`).join('')}</tbody></table>`
      :'<p class="sub">Sin pagos registrados aún.</p>'}
    </div>`;
}

function rtPos(el){
  const t=T();if(!t)return;const m=meta();
  const uids=partsT();const isAdmin=S.rol==='admin';
  const ranking=uids.map(uid=>{const pp=allParts()[uid]||{};return{uid,nombre:nombrePart(uid),mail:pp.mail||'',dni:pp.dni||'',pts:(t.fechas||[]).reduce((acc,_,fi)=>{const p=totalF(fi,uid,t,m);return acc+(p||0);},0)};}).sort((a,b)=>b.pts-a.pts);
  const cuota=t.cuota||500;
  const totalRec=uids.reduce((s,uid)=>s+(t.pagosDetalle?.[uid]||[]).reduce((ss,m)=>ss+m.monto,0),0);
  const deudores=uids.filter(uid=>{const {saldo}=distribuirPagos(uid,t)||{};const totalPag=(t.pagosDetalle?.[uid]||[]).reduce((s,m)=>s+m.monto,0);const totalDebe=(t.fechas||[]).reduce((s,_,fi)=>s+(ausente(fi,uid)?0:cuotaFecha(fi)),0);return totalPag<totalDebe;}).length;
  el.innerHTML=`<div class="metrics-grid" style="margin-top:4px">
    <div class="metric"><div class="metric-val">${uids.length}</div><div class="metric-lbl">Participantes</div></div>
    <div class="metric"><div class="metric-val">${(t.fechas||[]).length}</div><div class="metric-lbl">Fechas</div></div>
    ${isAdmin?`<div class="metric"><div class="metric-val">$${totalRec.toLocaleString()}</div><div class="metric-lbl">Recaudado</div></div><div class="metric"><div class="metric-val">${deudores}</div><div class="metric-lbl">Con deuda</div></div>`:''}
  </div>
  ${!ranking.length?'<p class="sub">Sin participantes.</p>':`<div style="overflow-x:auto"><table>
    <thead><tr><th>#</th><th>Participante</th><th>Total</th>${(t.fechas||[]).map(f=>`<th style="white-space:nowrap">${f.nombre}</th>`).join('')}${isAdmin?'<th>Pagos</th>':''}</tr></thead>
    <tbody>${ranking.map((r,i)=>{
      const pagado=(t.pagosDetalle?.[r.uid]||[]).reduce((s,m)=>s+m.monto,0);
      const {totalDebe:debe}=distribuirPagos(r.uid,t);
      const saldo=pagado-debe;const esMio=r.uid===S.uid;
      return`<tr ${esMio?'style="background:var(--c-info-bg)"':''}>
        <td>${i+1}</td>
        <td style="font-weight:${i<3?'500':'400'};white-space:nowrap">
          ${i===0?'🥇 ':i===1?'🥈 ':i===2?'🥉 ':''}${r.nombre}${esMio?' ⬅':''}
          <div style="font-size:10px;color:var(--c-text2);font-weight:400">${[r.mail,r.dni].filter(Boolean).join(' · ')}</div>
        </td>
        <td style="font-weight:500">${r.pts}</td>
        ${(t.fechas||[]).map((_,fi)=>{const tp=totalF(fi,r.uid,t,m);const aus=ausente(fi,r.uid);return`<td>${aus?'<span class="badge badge-gray">–</span>':tp!==null?tp:'?'}</td>`;}).join('')}
        ${isAdmin?`<td><span class="badge ${saldo>=0?'badge-green':'badge-red'}">${saldo>=0?'Al día':'Debe $'+Math.abs(saldo).toLocaleString()}</span></td>`:''}
      </tr>`;
    }).join('')}</tbody></table></div>`}`;
}

// ── PUNTOS ───────────────────────────────────────────────────
function calcPuntos(fi,pi,uid,t,m){
  if(ausente(fi,uid))return null;
  const rs=t.resultados?.[`${fi}-${pi}-signo`]||'';if(!rs)return null;
  if(m.sistema==='1x2'){const ps=t.pronosticos?.[`${fi}-${pi}-${uid}-signo`]||'';if(!ps)return null;return ps===rs?1:0;}
  const pron=t.pronosticos?.[`${fi}-${pi}-${uid}`]||{};const res=t.resultados?.[`${fi}-${pi}`]||{};
  if(pron.gl===undefined||pron.gl==='')return null;if(res.gl===undefined||res.gl==='')return null;
  const ps=t.pronosticos?.[`${fi}-${pi}-${uid}-signo`]||'';
  if(parseInt(pron.gl)===parseInt(res.gl)&&parseInt(pron.gv)===parseInt(res.gv))return 3;
  return ps===rs?1:0;
}
function totalF(fi,uid,t,m){
  if(ausente(fi,uid))return null;
  const f=(t.fechas||[])[fi];if(!f)return null;
  let tot=0,hay=false;
  (f.partidos||[]).forEach((_,pi)=>{
    const pts=calcPuntos(fi,pi,uid,t,m);
    if(pts!==null){tot+=pts;hay=true;}
  });
  return hay?tot:null;
}
function calcPozos(t, c){
  const pct1=(c.pct1??50)/100;
  const pct2=(c.pct2??25)/100;
  const pct3=(c.pct3??10)/100;
  const pctRetiro=(c.pctRetiro??15)/100;
  const fechas=t.fechas||[];
  let pozoAcum=c.pozoInicial??0; // acumulado que se traslada
  const resultado=[];

  fechas.forEach((f,fi)=>{
    const activos=(t.participantes||[]).filter(uid=>!ausente(fi,uid));
    const cuota=f.cuota??t.cuotasFecha?.[fi]??t.cuota??500;
    const totalJugadas=jugadasHabilitadasDeFecha(fi,t).length;
    const recaudado=totalJugadas*cuota;
    const retiroMonto=Math.round(recaudado*pctRetiro);
    const aPozo=recaudado-retiroMonto; // lo que va al pozo de ESTA fecha -> para la SIGUIENTE

    // Pozo total de esta fecha = lo acumulado de fechas anteriores
    // Si hay override manual, usarlo
    const pozoOverride=c.pozosManual?.[fi];
    const pozoTotal=pozoOverride??pozoAcum;

    const montoP1=Math.round(pozoTotal*pct1);
    const montoP2=Math.round(pozoTotal*pct2);
    const montoP3=Math.round(pozoTotal*pct3);

    const tieneRes=f.partidos?.length>0&&f.partidos.every((_,pi)=>!!t.resultados?.[`${fi}-${pi}-signo`]);

    if(!tieneRes){
      // Sin resultados: el pozo se acumula (suma lo recaudado en esta fecha al siguiente)
      resultado.push({fi,nombre:f.nombre,numero:f.numero,estado:f.estado,
        activos:totalJugadas,cuota,recaudado,retiroMonto,aPozo,pozoAcum,pozoTotal,
        montoP1,montoP2,montoP3,gan1:[],gan2:[],gan3:[],
        mPorGan1:0,mPorGan2:0,mPorGan3:0,proxPozoSugerido:pozoTotal+aPozo,calculado:false,pozoOverride:!!pozoOverride});
      pozoAcum=pozoTotal+aPozo; // acumula para siguiente fecha
      return;
    }

    // Calcular aciertos
    const nP=f.partidos.length;
    const jugActivas=jugadasHabilitadasDeFecha(fi,t);
    const scores=jugActivas.map(({uid,jIdx})=>{
      let ac=0;
      f.partidos.forEach((_,pi)=>{
        const rs=t.resultados?.[`${fi}-${pi}-signo`]||'';
        const ps=getPron(t,fi,pi,uid,jIdx,'signo')||'';
        if(rs&&ps===rs)ac++;
      });
      return{uid,jIdx,key:`${uid}#${jIdx}`,errores:nP-ac};
    });

    const e1=c.err1??0; const e2=c.err2??1; const e3=c.err3??2;
    const gan1=scores.filter(s=>s.errores===e1).map(s=>s.key);
    const noG1=scores.filter(s=>s.errores!==e1);
    const gan2=noG1.filter(s=>s.errores===e2).map(s=>s.key);
    const noG12=noG1.filter(s=>s.errores!==e2);
    const gan3=noG12.filter(s=>s.errores===e3).map(s=>s.key);

    const mPorGan1=gan1.length?Math.round(montoP1/gan1.length):0;
    const mPorGan2=gan2.length?Math.round(montoP2/gan2.length):0;
    const mPorGan3=gan3.length?Math.round(montoP3/gan3.length):0;

    // Vacantes: premios sin ganador se acumulan al siguiente pozo
    const vacante1=gan1.length?0:montoP1;
    const vacante2=gan2.length?0:montoP2;
    const vacante3=gan3.length?0:montoP3;
    const totalVacante=vacante1+vacante2+vacante3;

    const proxPozoSugerido=totalVacante+aPozo;
    resultado.push({fi,nombre:f.nombre,numero:f.numero,nroJugada:f.nroJugada||null,estado:f.estado,calculado:true,
      activos:totalJugadas,cuota,recaudado,retiroMonto,aPozo,pozoAcum,pozoTotal,proxPozoSugerido,
      montoP1,montoP2,montoP3,gan1,gan2,gan3,mPorGan1,mPorGan2,mPorGan3,
      vacante1,vacante2,vacante3,totalVacante,pozoOverride:!!pozoOverride});

    // Pozo para siguiente fecha = vacantes + lo recaudado en esta fecha
    pozoAcum=totalVacante+aPozo;
  });
  return resultado;
}
